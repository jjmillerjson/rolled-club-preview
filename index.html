      };

      const stampSlots = Array.from({ length: 8 }, (_, i) => {
        if (i >= displayStampCount) return { state: 'empty' };
        if (i === 7 && displayStampCount >= 8) return { state: 'reward' };
        if (stamps && stamps[i] && stamps[i].is_bonus) return { state: 'bonus' };
        return { state: 'filled' };
      });

      // Polling + visibilitychange
      const onRefreshRef = useRef(onRefresh);
      onRefreshRef.current = onRefresh;
      useEffect(() => { const interval = setInterval(async () => { if (document.visibilityState === 'visible') { try { await onRefreshRef.current(); } catch {} } }, POLL_INTERVAL); return () => clearInterval(interval); }, []);
      useEffect(() => { const handleVisible = () => { if (document.visibilityState === 'visible') { onRefreshRef.current().catch(() => {}); } }; document.addEventListener('visibilitychange', handleVisible); window.addEventListener('focus', handleVisible); return () => { document.removeEventListener('visibilitychange', handleVisible); window.removeEventListener('focus', handleVisible); }; }, []);
      // Auto-dismiss the on-demand "Scan to collect" QR the moment the stamp actually lands (staff
      // scanned it). While the QR is open we poll faster (3s) so the new stamp is caught quickly.
      const scanOpenStampRef = useRef(null);
      useEffect(() => {
        if (!showScanQR) { scanOpenStampRef.current = null; return; }
        scanOpenStampRef.current = stampCount;
        const iv = setInterval(() => { if (document.visibilityState === 'visible') onRefreshRef.current().catch(() => {}); }, 3000);
        return () => clearInterval(iv);
      }, [showScanQR]);
      useEffect(() => {
        if (showScanQR && scanOpenStampRef.current !== null && stampCount > scanOpenStampRef.current) {
          setShowScanQR(false);
          // The on-demand QR closes (above) the instant the stamp lands and the card
          // updates to show it — that's the feedback. No toast (JJ 10 Jul: it read as
          // clunky). The 8/8 completion still gets its own "You Beauty!" moment.
        }
      }, [stampCount, showScanQR]);
      const firstName = profile?.first_name || 'mate';
      const loyaltyId = profile?.loyalty_id || '';

      // ════════════════════════════════════════════════════════════════
      // PHASE 7e — Wallet-style card carousel engine.
      // One horizontal stage. Item 0 = the club card, items 1..N =
      // special faces. Motion is driven IMPERATIVELY (direct node
      // transforms on pointermove) — far cheaper than a React re-render
      // per drag frame. `centre` is a continuous float kept in a ref;
      // `activeIndex` (0..N-1) is the only React state the engine sets,
      // and it drives the context area below the stage.
      // ════════════════════════════════════════════════════════════════
      const N = 1 + specialCards.length;
      // Carousel behaviour by count (JJ): 3+ cards LOOP (peek both sides + wrap
      // around); exactly 2 (club + 1 special) is BOUNDED — special peeks RIGHT,
      // swipe back and forth, no loop. `wrap` gates every wrap-vs-clamp branch below.
      const wrap = N > 2;
      const stageRef = useRef(null);
      const slotRefs = useRef([]);          // card nodes, index-aligned
      const centreRef = useRef(0);          // continuous carousel position
      const dimsRef = useRef({ V: 0, W: 0, D: 0, DRAG: 1 });
      const dragRef = useRef({ active: false, baseC: 0, pressedIdx: null, startX: 0, moved: 0, vx: 0, lastX: 0, lastT: 0 });
      const rafRef = useRef(0);
      const clubMeasureRef = useRef(null);  // measures club-card height
      const CARD_SCALE = 0.92;  // ALL carousel cards (club + special faces) render at this fraction of the old width — a touch smaller AND uniform, so the club card matches the special faces as a side peek (no odd narrow club). Each card fills its own slot → no ghost outline.
      const [stageHeight, setStageHeight] = useState(0);
      const [activeIndex, setActiveIndex] = useState(0);
      // Reveal gate — the stage is opacity:0 until the first measure with a
      // real width has positioned every slot, so login never flashes a stack
      // of un-positioned cards (PHASE 7e2 carousel-stability fix).
      const [ready, setReady] = useState(false);
      const readyRef = useRef(false);
      const markReady = useCallback(() => {
        if (readyRef.current) return;
        readyRef.current = true;
        setReady(true);
      }, []);

      // keep activeIndex valid if the special-cards list shrinks
      useEffect(() => {
        if (activeIndex > N - 1) {
          const norm = wrap ? ((Math.round(centreRef.current) % N) + N) % N
                            : Math.max(0, Math.min(N - 1, Math.round(centreRef.current)));
          centreRef.current = norm;
          setActiveIndex(norm);
        }
      }, [N]);

      // relOf = each card's offset from centre. Looping (3+): wrap into the nearest
      // equivalent so a card at the far end peeks from the other side. Bounded (2):
      // raw offset → the single special peeks RIGHT and the ends stop dead.
      const relOf = useCallback((i) => {
        const r = i - centreRef.current;
        return wrap ? r - N * Math.round(r / N) : r;
      }, [wrap, N]);

      const layout = useCallback(() => {
        const { D } = dimsRef.current;
        const nodes = slotRefs.current;
        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i];
          if (!node) continue;
          const r = relOf(i);
          const a = Math.abs(r);
          node.classList.toggle('is-centre', a < 0.5);   // only the facing card animates / tilts
          // Perf (swipe lag on iPhone): drive motion with translate3d (GPU layer) +
          // opacity only. Side cards used to dim via filter:brightness — CSS filter
          // forces a full repaint every pointermove frame on iOS, which was the jank.
          // The dimming is now folded into opacity (cheap, composited).
          let x, s, o;
          if (a <= 1) {
            x = r * D;              s = 1 - 0.08 * a;          o = 1 - 0.25 * a;
          } else if (a < 2) {
            const sign = r < 0 ? -1 : 1;
            x = sign * D * (2 - a);  s = 0.92 - 0.10 * (a - 1);  o = 0.75 * (2 - a);
          } else {
            x = 0;                  s = 0.82;                  o = 0;
          }
          node.style.transform = 'translate3d(' + x + 'px,0,0) scale(' + s + ')';
          node.style.opacity = o.toFixed(3);
          node.style.zIndex = String(Math.round(100 - Math.min(a, 2) * 20));
        }
        const idx = wrap ? ((Math.round(centreRef.current) % N) + N) % N
                         : Math.max(0, Math.min(N - 1, Math.round(centreRef.current)));
        setActiveIndex((prev) => (prev === idx ? prev : idx));
      }, [relOf, wrap, N]);

      const measure = useCallback(() => {
        const stage = stageRef.current;
        if (!stage) return;
        const V = stage.clientWidth;
        if (!V) return;            // stage not laid out yet — wait for the ResizeObserver
        const W = Math.round((V - 30) * CARD_SCALE);
        const D = Math.round(V / 2 - 0.46 * W) - 16;   // the -16 insets the side cards from the screen edges so they don't collide with them
        const DRAG = Math.max(1, Math.round(V * 0.40));
        dimsRef.current = { V, W, D, DRAG };
        const slots = stage.querySelectorAll('.carousel-slot');
        slots.forEach((el) => { el.style.width = W + 'px'; el.style.marginLeft = (-W / 2) + 'px'; });
        layout();
        markReady();               // cards are positioned — safe to reveal the stage
      }, [layout, markReady]);

      // measure on mount + whenever card count, stamp/reward state or the
      // measured club-card height changes (club card is variable height).
      useLayoutEffect(() => {
        const h = clubMeasureRef.current ? clubMeasureRef.current.offsetHeight : 0;
        if (h && h !== stageHeight) setStageHeight(h);
        measure();
      }, [N, stageHeight, displayStampCount, displayIsReward, measure]);

      // Safety net: never leave the stage hidden. If no measure has landed a
      // real width within 600ms (paranoia path), reveal anyway.
      useEffect(() => {
        const t = setTimeout(markReady, 600);
        return () => clearTimeout(t);
      }, [markReady]);

      // Tilt engine — phone gyro drives the special-card finish + monogram.
      // Sets --tx/--ty (lean), --mb (monogram boost), --spot (highlight) + a
      // `tilting` class on the carousel stage; the .sf-* CSS reads them. No
      // gyro (desktop / iOS without motion permission) = the ambient shimmer.
      useEffect(() => {
        const stage = stageRef.current;
        if (!stage) return;
        let raf = 0, tx = 0, ty = 0, mtx = 0, mty = 0;
        const onOrient = (e) => {
          if (e.gamma == null && e.beta == null) return;
          const g = e.gamma || 0, b = (e.beta || 0) - 45;
          const nx = Math.max(-1, Math.min(1, g / 17));   // sensitive — light + shine
          const ny = Math.max(-1, Math.min(1, b / 17));
          const mnx = Math.max(-1, Math.min(1, g / 30));  // monogram fade — moderate range
          const mny = Math.max(-1, Math.min(1, b / 30));
          tx += (nx - tx) * 0.22;
          ty += (ny - ty) * 0.22;
          mtx += (mnx - mtx) * 0.22;
          mty += (mny - mty) * 0.22;
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = 0;
            const mag = Math.min(1, Math.hypot(tx, ty));
            const mmag = Math.min(1, Math.hypot(mtx, mty));
            stage.style.setProperty('--tx', tx.toFixed(3));
            stage.style.setProperty('--ty', ty.toFixed(3));
            stage.style.setProperty('--mb', Math.max(0.25, 1 - 0.8 * mmag).toFixed(3));
            stage.style.setProperty('--spot', (0.12 + 0.55 * mag).toFixed(3));
            stage.classList.add('tilting');
          });
        };
        // iOS 13+ legally requires a user-gesture permission prompt before a
        // *web page* may read the gyro. JJ's call (2026-06-24): don't prompt at
        // all on the web — iPhone leans on the ambient catch-light + sheen
        // instead (pure CSS; see the .sf sfAmbient animation, no permission
        // needed). The native App Store wrap can ask once, in-app, where users
        // expect it. Android / desktop need no prompt, so attach the gyro
        // listener there; the live tilt adds .tilting, which pauses the ambient
        // loop. Where requestPermission exists (iOS) we simply never attach —
        // no prompt, no web gyro, the ambient shimmer carries the finish.
        const needsPerm = typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
        if (!needsPerm) window.addEventListener('deviceorientation', onOrient, true);
        return () => {
          window.removeEventListener('deviceorientation', onOrient, true);
          if (raf) cancelAnimationFrame(raf);
        };
      }, []);

      // ResizeObserver: track the club card's live height + viewport width
      useEffect(() => {
        const stage = stageRef.current;
        const club = clubMeasureRef.current;
        if (typeof ResizeObserver === 'undefined') {
          const onR = () => measure();
          window.addEventListener('resize', onR);
          return () => window.removeEventListener('resize', onR);
        }
        const ro = new ResizeObserver(() => {
          if (club) {
            const h = club.offsetHeight;
            if (h) setStageHeight((prev) => (prev === h ? prev : h));
          }
          measure();
        });
        if (stage) ro.observe(stage);
        if (club) ro.observe(club);
        return () => ro.disconnect();
      }, [measure]);

      const animateTo = useCallback((rawTarget) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        // Looping: keep the raw target (may be <0 or >=N) so the animation slides the
        // shortest way, then normalise at the end. Bounded: clamp into [0, N-1].
        const target = wrap ? rawTarget : Math.max(0, Math.min(N - 1, rawTarget));
        const from = centreRef.current;
        const dur = 430;
        const t0 = performance.now();
        const ease = (t) => 1 - Math.pow(1 - t, 3);
        const step = (now) => {
          const t = Math.min(1, (now - t0) / dur);
          centreRef.current = from + (target - from) * ease(t);
          layout();
          if (t < 1) {
            rafRef.current = requestAnimationFrame(step);
          } else {
            rafRef.current = 0;
            centreRef.current = wrap ? ((target % N) + N) % N : target;   // normalise (loop) or keep (bounded)
            layout();
          }
        };
        rafRef.current = requestAnimationFrame(step);
      }, [layout, wrap, N]);

      // Pointer handlers (attached to the stage). idx = the slot pressed.
      const onPointerDown = useCallback((e, idx) => {
        const x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
        const now = performance.now();
        if (idx === activeIndex) {
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = 0; }
          dragRef.current = { active: true, baseC: centreRef.current, pressedIdx: idx, startX: x, moved: 0, vx: 0, lastX: x, lastT: now };
        } else {
          dragRef.current = { active: false, baseC: centreRef.current, pressedIdx: idx, startX: x, moved: 0, vx: 0, lastX: x, lastT: now };
        }
      }, [activeIndex]);

      const onPointerMove = useCallback((e) => {
        const d = dragRef.current;
        if (d.pressedIdx == null) return;
        const x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
        const dx = x - d.startX;
        d.moved = Math.max(d.moved, Math.abs(dx));
        if (d.active) {
          // Track pointer velocity (px/ms) so onPointerUp can carry a flick.
          // Smooth lightly so a single jittery frame doesn't dominate; ignore
          // zero-dt frames. Newest sample weighted 0.8.
          const now = performance.now();
          const dt = now - d.lastT;
          if (dt > 0) {
            const inst = (x - d.lastX) / dt;
            d.vx = d.vx === 0 ? inst : d.vx * 0.2 + inst * 0.8;
            d.lastX = x;
            d.lastT = now;
          }
          let c = d.baseC - dx / dimsRef.current.DRAG;
          if (c > d.baseC + 1) c = d.baseC + 1; else if (c < d.baseC - 1) c = d.baseC - 1;
          if (!wrap) { if (c < 0) c = 0; else if (c > N - 1) c = N - 1; }   // bounded ends; looping drags freely
          centreRef.current = c;
          layout();
        }
      }, [layout, wrap, N]);

      const onPointerUp = useCallback((e) => {
        const d = dragRef.current;
        if (d.pressedIdx == null) return;
        if (d.active) {
          // Flick momentum: convert pointer velocity (px/ms) into centre-units/ms
          // and project a short distance ahead, so a quick flick carries to the
          // next card even on a short drag. A slow release (vx ~ 0) projects ~0
          // and just snaps to nearest. Clamp travel to <= 2 cards from where the
          // drag began so a hard flick can't overshoot the stack.
          const dims = dimsRef.current;
          const centreVel = -d.vx / dims.DRAG;        // centre-units per ms
          const predicted = centreRef.current + centreVel * 120;
          let target = Math.round(predicted);
          const baseRound = Math.round(d.baseC);
          // one stroke advances at most one card in either direction
          if (target > baseRound + 1) target = baseRound + 1;
          else if (target < baseRound - 1) target = baseRound - 1;
          animateTo(target);
        } else if (d.moved < 10) {
          // tap a peeking side card → bring it to centre. Looping: pick the nearest
          // equivalent (base ± N) so it travels the short way. Bounded: its real index.
          if (wrap) {
            const cur = centreRef.current, base = d.pressedIdx;
            let best = base, bestDist = Math.abs(base - cur);
            for (let k = -1; k <= 1; k++) { const cand = base + k * N; const dist = Math.abs(cand - cur); if (dist < bestDist) { bestDist = dist; best = cand; } }
            animateTo(best);
          } else {
            animateTo(d.pressedIdx);
          }
        }
        dragRef.current = { active: false, baseC: centreRef.current, pressedIdx: null, startX: 0, moved: 0 };
      }, [animateTo, wrap, N]);

      // cleanup any in-flight animation on unmount
      useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

      // ════════════════════════════════════════════════════════════════
      // FIRST-RUN REVEAL + SWIPE COACH (real carousel)
      // ════════════════════════════════════════════════════════════════
      // The first time a customer lands on Home, make it clear they have BOTH a
      // special card AND their Club Card: centre one card with the other peeking,
      // then run a one-time "swipe →" coach that gently auto-nudges the real
      // stack to reveal the peeking card and springs back.
      //
      // WHICH card is centred (JJ's rule — never blindly specialCards[0]):
      //   • Claim/verify path (claimedCardType set): centre the JUST-CLAIMED
      //     special card (matched by card_type). If somehow not in the deck yet,
      //     fall back to the Club Card.
      //   • Otherwise (e.g. an existing customer whose first Home load happens to
      //     hold a Birthday card): centre the regular CLUB CARD (index 0).
      // The coach then nudges toward the OTHER card so both are seen.
      //
      // Gated by a PERMANENT per-user localStorage flag (same pattern as the
      // wallet-save prompt + install nudge) so it never repeats. Dismisses on the
      // first real swipe/tap. Respects prefers-reduced-motion (static hint, no
      // auto-nudge). GREY-BOX copy — JJ owns wording.
      const coachKey = profile?.id ? `claim_reveal_seen:${profile.id}` : null;
      const [coach, setCoach] = useState('off');   // 'off' | 'on'
      const [coachCentreIsClub, setCoachCentreIsClub] = useState(true);
      const coachFiredRef = useRef(false);       // generic first-run: one latch per mount
      const claimRevealedRef = useRef(null);     // fresh-claim: last claim type already revealed (survives generic latch)
      const coachRafRef = useRef(0);
      const dismissCoach = useCallback(() => {
        if (coachRafRef.current) { cancelAnimationFrame(coachRafRef.current); coachRafRef.current = 0; }
        setCoach('off');
      }, []);

      // ── New special-card unlock celebration ──────────────────────────────
      // Detect a newly-acquired special card (claim link / milestone / admin /
      // birthday) and play a "You've unlocked X!" celebration ONCE per card
      // (persisted per-card, separate from the swipe-coach flag), then hand off
      // to the swipe coach. Universal — covers any card via any channel.
      const [unlockCard, setUnlockCard] = useState(null);
      const [unlockExiting, setUnlockExiting] = useState(false);   // card-into-deck exit animation in progress
      // ── Birthday ON-THE-DAY full-screen moment ──
      // When the customer opens Home during their birthday week and their Birthday
      // card is CLAIMABLE (status 'available' — the backend only returns 'available'
      // inside the birthday window; outside it it's 'locked_birthday'), play a
      // one-off birthday celebration, then drop into the existing Claim flow.
      // Fires ONCE per birthday YEAR (localStorage keyed by card id + year).
      const [bdayMoment, setBdayMoment] = useState(null);
      const bdayFiredRef = useRef(false);   // one latch per mount
      const unlockPendingRef = useRef(false);     // synchronous guard so the coach effect (same pass) defers
      const unlockSeenKey = profile?.id ? `unlocked_seen:${profile.id}` : null;
      const readUnlockSeen = useCallback(() => {
        try { return new Set(JSON.parse(localStorage.getItem(unlockSeenKey) || '[]')); } catch { return new Set(); }
      }, [unlockSeenKey]);
      useEffect(() => {
        if (!ready || !unlockSeenKey || unlockCard || specialCards.length < 1) return;
        let raw = null;
        try { raw = localStorage.getItem(unlockSeenKey); } catch {}
        const ids = specialCards.map((c) => c.id).filter(Boolean);
        if (raw == null) {
          // FIRST run with this feature — DON'T celebrate cards the customer already
          // held (else every existing user gets a false "You've unlocked your Birthday
          // Card!" on the deploy). Baseline the current deck as seen; only a fresh
          // CLAIM in progress celebrates. Cards acquired AFTER this baseline celebrate.
          const claimed = claimedCardType && specialCards.find((c) => c.card_type === claimedCardType);
          if (claimed) {
            try { localStorage.setItem(unlockSeenKey, JSON.stringify(ids.filter((id) => id !== claimed.id))); } catch {}
            unlockPendingRef.current = true; setUnlockCard(claimed);
          } else {
            try { localStorage.setItem(unlockSeenKey, JSON.stringify(ids)); } catch {}
          }
          return;
        }
        const seen = new Set(JSON.parse(raw || '[]'));
        const unseen = specialCards.filter((c) => c && c.id && !seen.has(c.id));
        if (!unseen.length) return;
        // Prefer the just-claimed card; else the most recently issued.
        const claimed = claimedCardType && unseen.find((c) => c.card_type === claimedCardType);
        const target = claimed || unseen.slice().sort((a, b) => new Date(b.issued_at || 0) - new Date(a.issued_at || 0))[0];
        if (target) { unlockPendingRef.current = true; setUnlockCard(target); }
      }, [ready, specialCards, unlockSeenKey, unlockCard, claimedCardType]);
      const dismissUnlock = useCallback(() => {
        const card = unlockCard;
        if (!card || unlockExiting) return;
        try { const seen = readUnlockSeen(); seen.add(card.id); localStorage.setItem(unlockSeenKey, JSON.stringify([...seen])); } catch {}
        // Centre the unlocked card behind the overlay so it's already in place as the
        // overlay clears and the card settles up into the deck.
        const idx = specialCards.findIndex((c) => c.id === card.id);
        if (idx >= 0) { animateTo(idx + 1); setCoachCentreIsClub(false); }
        setUnlockExiting(true);   // play the card-into-deck exit, then hand off to the coach
        setTimeout(() => {
          unlockPendingRef.current = false;
          setUnlockCard(null);
          setUnlockExiting(false);
          // The unlock owns this reveal — stop the generic/claim coach double-firing.
          coachFiredRef.current = true;
          claimRevealedRef.current = claimedCardType || claimRevealedRef.current;
          try { if (coachKey) localStorage.setItem(coachKey, '1'); } catch {}
          if (onFirstRunConsumed) onFirstRunConsumed();
          setCoach('on');
        }, 440);
      }, [unlockCard, unlockExiting, specialCards, unlockSeenKey, coachKey, claimedCardType, animateTo, onFirstRunConsumed, readUnlockSeen]);

      // ── Birthday on-the-day moment: detect + arm ──
      // Defers to the unlock celebration (a freshly-issued birthday card should
      // play "just landed" first). Once the card is settled + claimable during the
      // birthday week, play the birthday moment ONCE per year.
      const bdaySeenKey = profile?.id ? `bday_moment_seen:${profile.id}` : null;
      useEffect(() => {
        if (!ready || !bdaySeenKey || bdayMoment) return;
        if (bdayFiredRef.current) return;
        if (unlockPendingRef.current || unlockCard) return;   // the unlock celebration owns the first reveal
        const bday = specialCards.find((c) => c && c.card_type === 'birthday' && c.status === 'available' && c.id);
        if (!bday) return;
        // Once per birthday year — key by card id + calendar year.
        const seenKey = `${bdaySeenKey}:${bday.id}:${new Date().getFullYear()}`;
        let seen = false;
        try { seen = localStorage.getItem(seenKey) === '1'; } catch {}
        if (seen) return;
        bdayFiredRef.current = true;
        try { localStorage.setItem(seenKey, '1'); } catch {}
        setBdayMoment(bday);
      }, [ready, specialCards, bdaySeenKey, bdayMoment, unlockCard]);
      const dismissBdayMoment = useCallback(() => {
        const card = bdayMoment;
        setBdayMoment(null);
        if (!card) return;
        // Drop into the existing Claim flow: centre the Birthday card so its
        // "Claim your gift" → armed-QR pane is right there. (Don't auto-arm.)
        const idx = specialCards.findIndex((c) => c.id === card.id);
        if (idx >= 0) { animateTo(idx + 1); setCoachCentreIsClub(false); }
        // The birthday moment owns this reveal — don't let the swipe coach fire on top.
        coachFiredRef.current = true;
        try { if (coachKey) localStorage.setItem(coachKey, '1'); } catch {}
      }, [bdayMoment, specialCards, animateTo, coachKey]);

      useEffect(() => {
        if (!ready || !coachKey) return;
        if (specialCards.length < 1) return;         // no special card = nothing to reveal
        if (unlockPendingRef.current) return;        // the unlock celebration owns this reveal — it triggers the coach on dismiss
        if (bdayMoment) return;                      // the birthday moment owns this reveal — it hands off on dismiss
        // TWO distinct triggers, decoupled so an existing member's first ordinary
        // Home load can't burn a real claim's reveal (the bug Jess hit — claimed
        // Legends, Home didn't reveal it):
        //   (1) FRESH-CLAIM reveal — claimedCardType is set (signup OR tap claim).
        //       ALWAYS fires, IGNORING the permanent claim_reveal_seen flag, and
        //       consumes the claim (onFirstRunConsumed clears the sessionStorage
        //       key + App state) so it plays exactly once per claim.
        //   (2) GENERIC first-run coach — no claimedCardType. One-shot, gated by
        //       the permanent per-user claim_reveal_seen flag.
        const isFreshClaim = !!(claimedCardType &&
          specialCards.some((c) => c.card_type === claimedCardType));
        let seen = false;
        try { seen = localStorage.getItem(coachKey) === '1'; } catch {}

              <${RedeemTierProgress} tierCardsLeft=${tierCardsLeft} tierProgress=${tierProgress} nextTier=${isMaxTier ? null : nextTier} nextColor=${nextTierColor} span=${nextTier ? (nextTier.req - tierFloor) : 0} />
              <button class="rc-btn" style=${{ animation: 'rcUp 0.4s ease 1.7s forwards' }} onClick=${dismissRedeemed}>Let's go!</button>
            </div>

          ${/* ── Tier-up "tier unlocked" announcement (tier crossed on redemption; skips Card Redeemed) ── */null}
          ${showTierUp ? html`
            <div class="rc-overlay ${tierUpFading ? 'overlay-fading' : ''}">
              <div class="tu-medalwrap">
                <div class="rc-glow"></div>
                <div class="tu-ring" style=${{ '--tu-col': tuColor }}></div>
                ${TIERUP_SPARKS.map((s, i) => html`<div key=${'ts'+i} class="tu-spark" style=${{ '--x': s.x+'px', '--y': s.y+'px', color: tuColor, fontSize: s.size+'px', animationDelay: s.delay+'s' }}>${'✦'}</div>`)}
                <div class="tu-medalidle"><div class="tu-medal">
                  <div class="tu-medal-tex card-header--${tuNewSlug}"></div>
                  <div class="tu-medal-scrim"></div>
                  <div class="tu-medal-roo"><${RooIcon} color="#00392c" size=${52} /></div>
                </div></div>
              </div>
              <div class="tu-eyebrow" style=${{ '--tu-col': tuColor }}>Tier Unlocked</div>
              <div class="tu-title">You're ${tuNewName}!</div>
              <div class="rc-reward rw-plate" style=${{ marginTop: '18px' }}>
                <div class="rc-reward-eyebrow">Your new reward</div>

                <div class="rw-rule"></div>
              </div>
              <button class="rc-btn" onClick=${dismissTierUp}>Let's go!</button>

          ` : null}

          ${/* ── You Beauty celebration overlay (8/8 earned) ── */null}
          ${showCelebration ? html`
            <div class="rc-overlay ${celebrationFading ? 'overlay-fading' : ''}">
              <div class="rc-herowrap">
                <div class="rc-glow"></div>
                <${RewardBurst} />
                <div class="rc-heroidle"><div class="rc-hero"><${SoyFishStamp} state="filled" /></div></div>
              </div>
              <div class="rc-title">${bonusCompleted ? 'Card Complete!' : 'You Beauty!'}</div>
              <div class="rc-sub">${bonusCompleted ? 'Nice one, legend.' : "That's great mate, you stamped 8/8"}</div>
              <div class="rc-reward rw-plate">
                <div class="rc-reward-eyebrow">${bonusCompleted ? "You've unlocked" : 'Your reward'}</div>
                <div class="rw-val">${currentReward}</div>
                <div class="rw-rule"></div>
              </div>
              <div class="rc-msg">Claim your reward next time you visit Rolled. Our shout!</div>
              <button class="rc-btn" onClick=${dismissCelebration}>Sweet as</button>
            </div>
          ` : null}

          ${/* ── PWA "Add to Home Screen" guide (never stacks on a celebration/QR/prompt) ── */null}
          ${showInstall && !showCelebration && !showRedeemed && !showTierUp && !showScanQR && !marketingPrompt ? html`<${InstallGuide} onClose=${closeInstall} />` : null}

          ${/* ── Bonus-stamp replay popup — "your mate came in" (tap anywhere → the fish pops) ── */null}
          ${replayPopup ? html`
            <div class="ref-pop-scrim" onClick=${() => replayAdvanceRef.current && replayAdvanceRef.current()}>
              <div class="ref-pop" role="status" onClick=${e => e.stopPropagation()}>
                <div class="ref-pop-fish"><${SoyFishMini} filled=${true} /></div>
                <div class="ref-pop-title">${replayPopup.kind === 'referee' ? 'Welcome to the Club!' : 'Your mate came in!'}</div>
                <div class="ref-pop-body">${replayPopup.kind === 'referee' ? "Here's a bonus stamp to start you off. You beauty!" : 'One of your mates came in, you both get a bonus stamp!'}</div>
                <button class="ref-pop-btn" onClick=${() => replayAdvanceRef.current && replayAdvanceRef.current()}>You Beauty!</button>
              </div>
            </div>
          ` : null}

          ${/* ── Referee "head start" welcome — first open for an invited mate (deferred behind any other overlay) ── */null}
          ${refereeWelcome && !unlockCard && !showRedeemed && !showCelebration && !showTierUp && replayCount === null && !marketingPrompt ? html`
            <div class="ref-pop-scrim" onClick=${() => setRefereeWelcome(false)}>
              <div class="ref-pop" role="status" onClick=${e => e.stopPropagation()}>
                <div class="ref-pop-fish"><${SoyFishMini} filled=${true} /></div>
                <div class="ref-pop-title">You've got a head start!</div>
                <div class="ref-pop-body">A mate invited you to the Club, so you're starting with ${stampCount} stamps on us. You beauty!</div>
                <button class="ref-pop-btn" onClick=${() => setRefereeWelcome(false)}>Let's go</button>
              </div>
            </div>
          ` : null}

          ${/* ── Wave 14.5 marketing opt-in prompt (generic across 4 triggers) ── */null}
          ${marketingPrompt ? html`
            <div role="dialog" aria-modal="true" style=${{ position: 'fixed', inset: 0, background: 'rgba(0,15,10,0.6)', backdropFilter: 'blur(4px)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px', animation: 'fadeIn 0.2s ease-out' }}>
              <div style=${{ background: 'var(--nori)', borderRadius: 'var(--r-lg)', maxWidth: '380px', width: '100%', padding: '28px 24px', border: '1px solid var(--kewpie-faint)', textAlign: 'center', position: 'relative' }}>
                <div style=${{ fontFamily: 'var(--fd)', fontSize: '24px', fontWeight: 700, color: 'var(--kewpie)', marginBottom: '10px' }}>${marketingPrompt.copy.title}</div>
                <p class="t-body c-muted" style=${{ marginBottom: '22px' }}>${marketingPrompt.copy.body}</p>
                <button class="btn btn-primary" style=${{ width: '100%', marginBottom: '10px' }} disabled=${marketingPromptSaving} onClick=${async () => {
                  if (marketingPromptSaving) return;
                  setMarketingPromptSaving(true);
                  try {
                    await api('/api/v1/marketing-prompts/' + marketingPrompt.trigger_key + '/event', {
                      method: 'POST',
                      body: JSON.stringify({ outcome: 'converted' }),
                    });
                    showToast("Thanks legend — you're in.", 'success');
                    setMarketingPrompt(null);
                    onRefresh && onRefresh();
                  } catch (err) {
                    showToast((err && err.message) || "Couldn't save right now — try profile.", 'error');
                  } finally {
                    setMarketingPromptSaving(false);
                  }
                }}>${marketingPromptSaving ? 'Saving...' : marketingPrompt.copy.cta_yes}</button>
                <button class="btn btn-outline" style=${{ width: '100%' }} onClick=${() => {
                  api('/api/v1/marketing-prompts/' + marketingPrompt.trigger_key + '/event', {
                    method: 'POST',
                    body: JSON.stringify({ outcome: 'dismissed' }),
                  }).catch(() => {});
                  setMarketingPrompt(null);
                }}>${marketingPrompt.copy.cta_no}</button>
              </div>
            </div>
          ` : null}
        </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // HISTORY SCREEN
    // ════════════════════════════════════════════════════════════════
    // One completed-card trophy block — tier strip (the tier it was PLAYED under) +
    // 8 soy-fish + date range + Completed badge. Shared by the Collection most-recent
    // slot and the full "View all" list so they're identical.
    function CompletedCardBlock({ card, cardNum, idx = 0 }) {
      const fmtDate = (d) => { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); };
      let tierAtCard = null; for (const t of TIERS) { if (cardNum > t.req) tierAtCard = t.name; }
      const tSlug = tierAtCard ? tierAtCard.toLowerCase() : null;
      return html`<div class="history-card slide-up" style=${{ animationDelay: `${idx * 0.07}s`, overflow: 'hidden' }}>
        ${tierAtCard ? html`
          <div class="card-header--${tSlug}" style=${{ height: '36px', position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', margin: '-16px -16px 12px -16px' }}>
            <div class="card-header-scrim"></div>
            <div class="card-header-shimmer card-header-shimmer--${tSlug}"></div>
            <div style=${{ position: 'relative', zIndex: 3, display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' }}>
              <span class="t-caption" style=${{ fontWeight: 700, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.2)' }}>Card #${cardNum}</span>
              <span class="card-tier-badge card-tier-badge--${tSlug}" style=${{ fontSize: '8px', padding: '2px 8px' }}>${tierAtCard}</span>
            </div>
          </div>
        ` : html`
          <div style=${{ height: '36px', position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', margin: '-16px -16px 12px -16px', background: 'var(--nori-light)' }}>
            <${WaveLines} />
            <div style=${{ position: 'relative', zIndex: 2, display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' }}>
              <span class="t-caption" style=${{ fontWeight: 700, color: 'var(--kewpie)' }}>Card #${cardNum}</span>
            </div>
          </div>
        `}
        <div class="history-stamps">${Array.from({ length: 8 }, (_, i) => html`<${SoyFishMini} key=${i} filled=${true} />`)}</div>
        <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginTop: '8px' }}>
          <div>
            <div class="history-meta"><span class="history-meta-item"><${IconCal} /> ${fmtDate(card.started_at || card.created_at)} — ${fmtDate(card.completed_at || card.redeemed_at)}</span></div>
          </div>
          <div class="history-badge">Completed</div>
        </div>
      </div>`;
    }

    function CompletedCardsScreen({ onBack }) {
      const [history, setHistory] = useState([]); const [loading, setLoading] = useState(true);
      useEffect(() => { (async () => { try { const res = await api('/api/v1/customers/me/history'); setHistory(res.completed_cards || []); } catch { setHistory([]); } setLoading(false); })(); }, []);
      const fmtDate = (d) => { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); };
      if (loading) return html`<div class="screen"><div class="loading-screen"><div class="spinner"></div><span class="t-caption c-muted">Loading history...</span></div></div>`;
      return html`
        <div class="screen fade-in">
          <button class="back-button" onClick=${onBack}><${IconBack} /> Collection</button>
          <div class="t-hero" style=${{ marginBottom: '4px' }}>Completed Cards</div>
          <p class="t-caption c-muted" style=${{ marginBottom: '20px' }}>Your completed Club Cards. You Beauty!</p>
          ${history.length === 0 ? html`<div class="empty-state"><div style=${{ display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '8px', opacity: 0.3 }}>${Array.from({ length: 4 }, (_, i) => html`<div key=${i} style=${{ width: '32px' }}><${SoyFishMini} filled=${false} /></div>`)}</div><div class="t-section" style=${{ color: 'var(--kewpie)' }}>Your trophy wall awaits</div><p class="t-caption c-muted" style=${{ maxWidth: '260px', marginTop: '4px' }}>Every time you fill a card and claim your free rolls, it gets immortalised here. Get scanning!</p></div>` : html`<div>${history.map((card, idx) => html`<${CompletedCardBlock} key=${card.id || idx} card=${card} cardNum=${history.length - idx} idx=${idx} />`)}</div>`}
        </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // REWARD HISTORY
    // ════════════════════════════════════════════════════════════════
    // Club-card rewards come back as the raw reward_type ('2_free_rolls'), and that
    // value is admin-editable in the Command Centre — so pretty-print it generically
    // rather than mapping a fixed list that would go stale the moment JJ changes it.
    const rewardTypeLabel = (raw) => {
      const s = String(raw || '').replace(/_/g, ' ').trim();
      if (!s) return 'Reward Claimed';
      return s.replace(/\b[a-z]/g, (c) => c.toUpperCase());
    };

    // The club card's own wave motif, windowed for the 44x33 chip. Same path geometry as
    // WaveLines; only the viewBox and the stroke alpha differ, because that component is
    // drawn across a whole card header and neither survives being shrunk this far.
    const REWARD_WAVE_PATHS = Array.from({ length: 16 }, (_, i) => {
      const y = -130 + i * 26;
      return 'M-300,' + y + ' Q-220,' + (y + 26) + ' -140,' + y + ' Q-60,' + (y - 26) +
             ' 20,' + y + ' Q100,' + (y + 26) + ' 180,' + y + ' Q260,' + (y - 26) +
             ' 340,' + y + ' Q420,' + (y + 26) + ' 500,' + y + ' Q580,' + (y - 26) + ' 660,' + y;
    });
    function RewardChipWaves() {
      return html`
        <svg viewBox="126 8 88 66" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <g transform="rotate(-25, 170, 35)">
            ${/* waveSlide translates by 26 — exactly the wave spacing — so it loops
                 seamlessly. Same keyframe the full-size card header uses. */ null}
            <g class="rchip-waves">
              <g stroke="rgba(212,251,111,0.45)" fill="none" stroke-width="1.8" stroke-linecap="round">
                ${REWARD_WAVE_PATHS.map((d, i) => html`<path key=${i} d=${d} />`)}
              </g>
            </g>
          </g>
        </svg>`;
    }

    // One reward the customer actually took — a special-card redemption (a Legends
    // unlock IS a redemption; there's no separate unlock concept) or a club-card claim.
    // The left swatch is cut from the same cloth as its source: a special entry wears
    // that card type's finish, a club-card entry the tier header it was claimed under.
    // Shared by the Collection preview and the full "View all" list so they're identical.
    function RewardHistoryRow({ entry, idx = 0, tierSlug = null }) {
      const fmtDate = (d) => { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); };
      const isSpecial = entry.kind === 'special';
      // The row leads with what the customer GOT — "2 Free Rolls", not "FREE SUSHI FOR
      // LIFE" (JJ, 19 Jul). Which card it was is already carried by the chip's finish,
      // so the name isn't lost.
      //
      // ⚠️ reward_label ONLY. It is deliberately NOT backed by reward_description:
      // JJ — "they need to be configurable so i can actually choose what each says,
      // they shouldnt be copied over from anywhere." Falling through to the description
      // put full sentences in the row ("50% off your whole order.") and, worse, made a
      // derived string indistinguishable from a chosen one.
      //
      // Until a card's label is configured the row shows the card's NAME, which is at
      // least true, and visibly not-yet-set rather than quietly wrong.
      const title = isSpecial
        ? (entry.reward_label || entry.title || 'Special Card')
        : rewardTypeLabel(entry.title);
      // The tier shown here MUST agree with the Completed Cards block below it. The
      // backend counts the card being claimed towards its own tier; this app's rule
      // (getTierAtCard, and the comment above it) counts it only from the NEXT card. Left
      // to the backend's answer, cards 3, 7, 15 and 25 would wear one tier here and a
      // different one six inches down the same screen. So the caller resolves the tier
      // from the history list using the app's rule and passes it in; entry.tier is only
      // the fallback for when the card isn't in that list.
      const tSlug = tierSlug || entry.tier || 'standard';
      const when = fmtDate(entry.occurred_at);
      // Just the date. JJ dropped the site from the row (19 Jul) — it was noise, and it
      // was only present on some entries anyway, so rows read inconsistently.
      const meta = when;
      // Stagger is capped: .slide-up holds a row at opacity 0 for its whole delay, and
      // this feed can run to hundreds of entries (an FS4L holder redeeming daily), so an
      // uncapped ramp would leave the bottom of the list blank for ten-plus seconds.
      return html`<div class="coll-crow slide-up" style=${{ animationDelay: (Math.min(idx, 12) * 0.07) + 's', marginBottom: '8px' }}>
        <div class="coll-crow-l">
          ${isSpecial
            ? html`<div class="coll-swatch" style=${{ background: specialFinish(entry.card_type) }}></div>`
            : tSlug === 'standard'
              ? html`<div class="coll-swatch coll-swatch--standard"><${RewardChipWaves} /></div>`
              : html`<div class="coll-swatch card-header--${tSlug}"></div>`}
          <div>
            <div class="coll-crow-t">${title}</div>
            <div class="coll-crow-d">${meta}</div>
          </div>
        </div>
      </div>`;
    }

    function RewardHistoryScreen({ onBack }) {
      const [entries, setEntries] = useState([]); const [loading, setLoading] = useState(true);
      const [failed, setFailed] = useState(false);
      const [history, setHistory] = useState([]);
      // Whole feed in one go, like Completed Cards — the backend caps limit at 200.
      // A failure must NOT fall through to the empty state: telling a Legends holder with
      // a wall of rewards that they have none is worse than showing an error, and this
      // screen is exactly where the preview's "tap to retry" lands.
      const load = useCallback(async () => {
        setLoading(true); setFailed(false);
        try {
          const res = await api('/api/v1/customers/me/reward-history?limit=200');
          setEntries((res && res.entries) || []);
        } catch (e) { setFailed(true); }
        // The club-card tier is resolved from the history list, not from the payload —
        // see the note in RewardHistoryRow. Its own failure is not fatal: the row falls
        // back to the backend's tier rather than losing the whole screen.
        try {
          const h = await api('/api/v1/customers/me/history');
          setHistory((h && h.completed_cards) || []);
        } catch (e) { /* fall back to entry.tier */ }
        setLoading(false);
      }, []);
      useEffect(() => { load(); }, [load]);
      const tierForEntry = (entry) => {
        if (entry.kind !== 'club_card' || !history.length) return null;
        const idx = history.findIndex(c => c.id === entry.id);
        if (idx === -1) return null;
        return String(getTierAtCard(history.length - idx) || 'standard').toLowerCase();
      };
      if (loading) return html`<div class="screen"><div class="loading-screen"><div class="spinner"></div><span class="t-caption c-muted">Loading rewards...</span></div></div>`;
      return html`
        <div class="screen fade-in">
          <button class="back-button" onClick=${onBack}><${IconBack} /> Collection</button>
          <div class="t-hero" style=${{ marginBottom: '4px' }}>Reward History</div>
          <p class="t-caption c-muted" style=${{ marginBottom: '20px' }}>Every reward you've taken. Good on ya!</p>
          ${failed ? html`<div class="empty-state"><div class="t-section" style=${{ color: 'var(--kewpie)' }}>Couldn't load your rewards</div><p class="t-caption c-muted" style=${{ maxWidth: '260px', marginTop: '4px' }}>Something went wrong on our end — your rewards are safe.</p><button class="coll-viewall" onClick=${load}>Try again</button></div>`
            : entries.length === 0 ? html`<div class="empty-state"><div style=${{ display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '8px', opacity: 0.3 }}>${Array.from({ length: 4 }, (_, i) => html`<div key=${i} style=${{ width: '32px' }}><${SoyFishMini} filled=${false} /></div>`)}</div><div class="t-section" style=${{ color: 'var(--kewpie)' }}>No rewards yet</div><p class="t-caption c-muted" style=${{ maxWidth: '260px', marginTop: '4px' }}>Fill a Club Card or unlock a special one, and every reward you take gets logged here.</p></div>` : html`<div>${entries.map((e, idx) => html`<${RewardHistoryRow} key=${e.kind + '-' + e.id} entry=${e} idx=${idx} tierSlug=${tierForEntry(e)} />`)}</div>`}
        </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // COLLECTION SCREEN (Phase 6 — trophy cabinet)
    // ════════════════════════════════════════════════════════════════
    function CollectionScreen({ profile, showToast }) {
      const [view, setView] = useState('main');
      const [special, setSpecial] = useState(_collectionCardsCache);
      const [history, setHistory] = useState([]);
      const [histLoaded, setHistLoaded] = useState(false);
      const [rewards, setRewards] = useState([]);
      const [rewardsTotal, setRewardsTotal] = useState(0);
      const [rewardsLoaded, setRewardsLoaded] = useState(false);
      const [rewardsFailed, setRewardsFailed] = useState(false);

      useEffect(() => {
        let alive = true;
        api('/api/v1/customers/me/special-cards')
          .then(res => { if (alive && res && Array.isArray(res.cards)) { _specialCardsCache = dedupeSpecialCards(res.cards); _collectionCardsCache = collectionSpecialCards(res.cards); setSpecial(_collectionCardsCache); } })
          .catch(() => {});
        api('/api/v1/customers/me/history')
          .then(res => { if (alive) setHistory((res && res.completed_cards) || []); })
          .catch(() => {})
          .finally(() => { if (alive) setHistLoaded(true); });
        loadRewards();
        return () => { alive = false; };
      }, []);

      // Preview only — the full feed is refetched by RewardHistoryScreen on "View all".
      // A failure has to be recorded, not swallowed: there's no authoritative count on
      // the profile to fall back on, so without this flag a dead fetch would render the
      // "no rewards yet" copy at somebody with a wall of them.
      //
      // Deliberately a named callback rather than inline in the mount effect: this screen
      // is NOT remounted when you drill into the full list and come back (the view is
      // internal state), so without a way to re-run this, one failed load left the block
      // dead — and its own "tap to retry" could never clear it.
      const loadRewards = useCallback(() => {
        setRewardsFailed(false);
        return api('/api/v1/customers/me/reward-history?limit=3')
          .then(res => { setRewards((res && res.entries) || []); setRewardsTotal((res && res.total) || 0); })
          .catch(() => { setRewardsFailed(true); })
          .finally(() => setRewardsLoaded(true));
      }, []);

      // Device back button (Android/iOS) returns to Collection main instead of leaving the app.
      useEffect(() => {
        const onPop = () => setView('main');
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      // Same tier rule the Completed Cards block uses, resolved from the same history
      // list, so a card can never wear two different tiers on one screen.
      const rewardTierSlug = (entry) => {
        if (entry.kind !== 'club_card' || !history.length) return null;
        const idx = history.findIndex(c => c.id === entry.id);
        if (idx === -1) return null;
        return String(getTierAtCard(history.length - idx) || 'standard').toLowerCase();
      };
      const goToCompleted = () => { try { window.history.pushState({ collView: 1 }, ''); } catch (e) {} setView('completed'); };
      const goToRewards = () => { try { window.history.pushState({ collView: 1 }, ''); } catch (e) {} setView('rewards'); };

      if (view === 'completed') return html`<${CompletedCardsScreen} onBack=${() => window.history.back()} />`;
      if (view === 'rewards') return html`<${RewardHistoryScreen} onBack=${() => { loadRewards(); window.history.back(); }} />`;

      const completedCards = profile?.completed_cards || history.length || 0;
      // Interim: loyalty rolls (cards x2). Precise per-redemption tally (FS4L/birthday x2,
      // tier-aware) lands with the Supabase backend rebuild — see memory.
      const freeRolls = completedCards * 2;

ectification</strong> \u2014 request corrections to inaccurate data</li><li><strong>Erasure</strong> \u2014 request deletion of your account and all data</li><li><strong>Portability</strong> \u2014 receive your data in a standard format</li><li><strong>Withdraw consent</strong> \u2014 stop using the service at any time</li></ul><p>Contact us at <strong>gday@eatrolled.com</strong>. We will respond within 30 days.</p><h2>How long we keep it</h2><p>We retain data while your account is active. Inactive accounts (24 months) will be flagged for review. Account deletion removes all personal data within 30 days.</p><h2>Cookies</h2><p>The app uses a secure auth token cookie. We do not use third-party tracking cookies.</p><h2>Children</h2><p>Not directed at children under 16. We do not knowingly collect data from anyone under 16.</p><h2>Changes</h2><p>We may update this policy. Significant changes notified via app or email.</p><h2>Contact</h2><p><strong>Rolled Aussie-Style Sushi</strong><br/>Email: gday@eatrolled.com</p></div></div>`;

    // Build the same shape GET /me/tiers returns, from already-loaded profile
    // data. Resilient fallback so the Rewards tab renders even if that endpoint
    // is unavailable (backend not yet deployed / offline).
    function buildLadderFromProfile(profile) {
      const completed = parseInt(profile && profile.completed_cards, 10) || 0;
      const raw = ((profile && profile.loyalty_tier) || 'none').toLowerCase();
      const currentName = raw === 'none' ? 'standard' : raw;
      let currentIdx = REWARD_LADDER.findIndex(t => t.name === currentName);
      if (currentIdx === -1) {
        currentIdx = 0;
        for (let i = 0; i < REWARD_LADDER.length; i++) { if (completed >= REWARD_LADDER[i].threshold) currentIdx = i; }
      }
      const tiers = REWARD_LADDER.map((t, i) => ({ ...t, status: i < currentIdx ? 'done' : i === currentIdx ? 'current' : 'locked' }));
      const nextRow = REWARD_LADDER.find(t => t.threshold > completed) || null;
      return {
        completed_cards: completed,
        current_tier: { name: tiers[currentIdx].name, reward_description: tiers[currentIdx].reward_description },
        next_tier: nextRow ? { name: nextRow.name, threshold: nextRow.threshold, cards_to_next: nextRow.threshold - completed } : null,
        tiers,
      };
    }

    function RewardsScreen({ profile, showToast }) {
      // Seed instantly from already-loaded profile data so the tab renders on
      // first paint — no null state, so no spinner flash when you open Rewards
      // (the bug: other tabs get their data from props, this one used to wait on
      // a fetch). The /me/tiers fetch then upgrades to authoritative server data
      // in the background. Fallback + server share the same 5 tiers, so the
      // selected-tier name stays valid across the swap.
      const defaultSel = (d) => (d.next_tier && d.next_tier.name) || (d.current_tier && d.current_tier.name) || (d.tiers[0] && d.tiers[0].name) || null;
      const [data, setData] = useState(() => buildLadderFromProfile(profile));
      const [selected, setSelected] = useState(() => defaultSel(buildLadderFromProfile(profile)));
      // Mate Referral — the "Get Mates Rates" block. Fetched alongside tiers;
      // the block only renders when referral is enabled server-side (r.enabled).
      // Seed the referral block from a per-device cache so it renders INSTANTLY
      // on every Rewards-tab open (the screen re-mounts each time). Without this
      // the block fetches async and pops in a beat late, shoving the Legends
      // block down — the flicker JJ flagged. Fresh data still arrives from the
      // fetch below and updates in place (no layout shift).
      const [referral, setReferral] = useState(() => {
        try { const s = localStorage.getItem('rolled_referral_cache'); return s ? JSON.parse(s) : null; } catch { return null; }
      });
      const [showRefQR, setShowRefQR] = useState(false);
      const [copied, setCopied] = useState(false);   // desktop copy-fallback: flip the Invite button to "Link copied!"
      const copiedTimer = useRef(null);

      useEffect(() => {
        let alive = true;
        api('/api/v1/customers/me/tiers')
          .then(res => { if (alive && res && Array.isArray(res.tiers)) setData(res); })
          .catch(() => {});
        api('/api/v1/customers/me/referral')
          .then(r => {
            if (!alive) return;
            if (r && r.enabled) { setReferral(r); try { localStorage.setItem('rolled_referral_cache', JSON.stringify(r)); } catch {} }
            else if (r && r.enabled === false) { setReferral(null); try { localStorage.removeItem('rolled_referral_cache'); } catch {} }
          })
          .catch(() => {});
        return () => { alive = false; };
      }, []);

      // Share the referral link via the native OS share sheet (mobile). On
      // desktop / no-share-sheet browsers, copy the message and flip the Invite
      // button to a "Link copied!" state (cleaner than a toast).
      const flagCopied = useCallback(() => {
        setCopied(true);
        if (copiedTimer.current) clearTimeout(copiedTimer.current);
        copiedTimer.current = setTimeout(() => setCopied(false), 2200);
      }, []);
      const shareReferral = useCallback(async () => {
        if (!referral || !referral.link) return;
        const url = referral.link;
        const shareUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;
        // JJ-locked share copy — URL inline in the message (not passed separately). 🍣🦘
        const text = "Join me on the Rolled Club Card — we'll both score bonus stamps \u{1F363}\u{1F998} " + shareUrl;
        if (navigator.share) {
          try { await navigator.share({ title: 'Rolled Club Card', text }); } catch (e) { /* user cancelled the share sheet */ }
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
          try { await navigator.clipboard.writeText(text); } catch {}
          flagCopied();
        } else { flagCopied(); }
      }, [referral, flagCopied]);

      const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
      const current = data.current_tier || { name: 'standard', reward_description: '2 Free Rolls' };
      const heroSlug = current.name;
      const heroHasTier = heroSlug !== 'standard';
      const sel = data.tiers.find(t => t.name === selected) || data.tiers[0];

      // Mate Referral block display values (null until fetched / when disabled).
      const mr = referral;
      const mrMilestone = (mr && mr.milestone) || 20;
      const mrIn = (mr && mr.mates_in) || 0;
      const mrReached = !!(mr && mr.milestone_reached);
      const mrPct = Math.max(mrIn > 0 ? 5 : 0, Math.min(100, Math.round((mrIn / mrMilestone) * 100)));

      return html`
        <div class="screen slide-up">
          <h1 class="t-hero" style=${{ marginBottom: '4px' }}>Rewards</h1>
          <p class="t-body c-muted" style=${{ marginBottom: '18px' }}>Roll up and get rewarded</p>

          ${/* ── Hero: current tier (real texture + live motion + roo) ── */null}
          <div class="rwd-hero card-header--${heroSlug} ${heroHasTier ? '' : 'rwd-hero--standard'}">
            ${heroSlug === 'standard' ? html`<${WaveLines} />` : null}
            ${heroHasTier ? html`<div class="card-header-scrim ${heroSlug === 'diamond' ? 'card-header-scrim--diamond' : ''}"></div>` : null}
            ${heroHasTier ? html`<div class="card-header-shimmer card-header-shimmer--${heroSlug}"><div class="shim1"></div><div class="shim2"></div><div class="shim3"></div></div>` : null}
            <div class="rwd-hero-in">
              <div class="rwd-hero-top">
                <${RooIcon} color=${heroHasTier ? '#00392c' : 'var(--wasabi)'} size=${24} />
                ${heroHasTier ? html`<span class="card-tier-badge card-tier-badge--${heroSlug}">${cap(heroSlug)}</span>` : null}
              </div>
              <div>
                <div class="rwd-hero-lbl">Your current tier reward</div>
                <div class="rwd-hero-reward">${current.reward_description}</div>
              </div>
            </div>
          </div>

          ${/* ── Tier Rewards — tappable blocks, real tier textures ── */null}
          <p class="rwd-sec-label">Tier Rewards</p>
          <div class="rwd-grid">
            ${data.tiers.map(t => {
              const locked = t.status === 'locked';
              const ink = TIER_TEXT_INK[t.name] || '#fff';
              return html`<div key=${t.name} class="rwd-tb card-header--${t.name} ${locked ? 'is-locked' : ''} ${selected === t.name ? 'is-on' : ''}" onClick=${() => setSelected(t.name)} role="button" aria-label=${(t.name === 'standard' ? 'Standard' : cap(t.name)) + ' tier'}>
                ${t.status === 'current' ? html`<span class="rwd-tb-dot"></span>` : null}
                <div class="rwd-tb-scrim"></div>
                <div class="rwd-tb-in">${locked ? html`<${IconLock} color=${ink} />` : html`<${IconLockOpen} color=${ink} />`}</div>
              </div>`;
            })}
          </div>

          ${sel ? html`
            <div class="rwd-reveal">
              <div>
                <div class="rwd-reveal-name">${sel.name === 'standard' ? 'Standard' : cap(sel.name)}</div>
                <div class="rwd-reveal-reward">${sel.reward_description}</div>
              </div>
              <span class="rwd-pill rwd-pill--${sel.status === 'done' ? 'done' : sel.status === 'current' ? 'current' : 'locked'}">${sel.status === 'done' ? 'Completed' : sel.status === 'current' ? 'Unlocked' : 'Locked'}</span>
            </div>
          ` : null}

          ${/* ── Get Mates Rates — Mate Referral block (peer of Legends) ── */null}
          ${mr ? html`
            <p class="rwd-sec-label">Refer a mate</p>
