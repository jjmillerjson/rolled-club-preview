    function WalletButtons({ showToast, onDismiss, variant }) {
      const [loadingGoogle, setLoadingGoogle] = useState(false);
      const [loadingApple, setLoadingApple] = useState(false);
      // Mini variant (Home carousel) picks the platform-appropriate single
      // action so it fits one line; full variant shows both chips.
      const isApplePlatform = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);

      // Reset the 'Opening…' loading state whenever the user returns to the
      // page. The Google Wallet save either navigates the tab away
      // (window.location.href = save_url) OR — on Android/Chrome — hands off
      // to the Wallet app while the browser tab stays alive. pageshow only
      // fires on a fresh load / BFCache restore, so the tab-stays-alive case
      // left the button stuck on 'Opening…' indefinitely (the bug JJ hit on
      // Samsung+Chrome). visibilitychange + focus cover the return-to-live-tab
      // path — same pattern the poller uses below. Belt-and-braces across all
      // return routes; a stray reset mid-request is harmless (the handler
      // still completes + navigates on success).
      useEffect(() => {
        const reset = () => { setLoadingGoogle(false); setLoadingApple(false); };
        const onVisible = () => { if (document.visibilityState === 'visible') reset(); };
        window.addEventListener('pageshow', reset);
        document.addEventListener('visibilitychange', onVisible);
        window.addEventListener('focus', reset);
        return () => {
          window.removeEventListener('pageshow', reset);
          document.removeEventListener('visibilitychange', onVisible);
          window.removeEventListener('focus', reset);
        };
      }, []);

      const onAddGoogle = async () => {
        if (loadingGoogle) return;
        setLoadingGoogle(true);
        try {
          const res = await api('/api/v1/customers/me/wallet/google', { method: 'POST' });
          if (res && res.ready && res.save_url) {
            if (onDismiss) onDismiss();
            window.location.href = res.save_url;
            return;
          }
          showToast && showToast("Wallet pass isn't ready yet \u2014 try again soon", 'error');
        } catch (err) {
          showToast && showToast(err.message || "Couldn't add to Wallet", 'error');
        }
        setLoadingGoogle(false);
      };

      // Apple Wallet returns the .pkpass binary directly, not JSON, so we
      // bypass the api() helper (which JSON-parses every response) and use
      // raw fetch + blob handoff. On iOS Safari the .pkpass mime triggers
      // Wallet.app automatically; on Android it just downloads the file.
      const onAddApple = async () => {
        if (loadingApple) return;
        setLoadingApple(true);
        try {
          const token = getToken();
          const res = await fetch(`${API_BASE}/api/v1/customers/me/wallet/apple?_t=${Date.now()}`, {
            method: 'POST',
            headers: token ? { 'Authorization': `Bearer ${token}` } : {},
            cache: 'no-store',
          });
          if (!res.ok) {
            // 501 = endpoint not yet configured server-side, anything else = unexpected
            const msg = res.status === 501
              ? "Apple Wallet isn't ready yet \u2014 try again soon"
              : `Couldn't add to Wallet (${res.status})`;
            showToast && showToast(msg, 'error');
            setLoadingApple(false);
            return;
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (onDismiss) onDismiss();
          // Navigate the current tab to the blob URL \u2014 iOS Safari picks the
          // pkpass mime type and hands it off to Wallet.app. Anchor download
          // would suppress the Wallet handoff on iOS, so plain navigation.
          window.location.href = url;
          // Defer revoke so the navigation has time to consume it.
          setTimeout(() => URL.revokeObjectURL(url), 60_000);
        } catch (err) {
          showToast && showToast(err.message || "Couldn't add to Wallet", 'error');
        }
        setLoadingApple(false);
      };

      if (variant === 'mini') {
        const loading = isApplePlatform ? loadingApple : loadingGoogle;
        const onAdd = isApplePlatform ? onAddApple : onAddGoogle;
        const glyph = isApplePlatform
          ? html`<svg viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>`
          : html`<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#4285F4" d="M44 24c0-1.4-.1-2.7-.4-4H24v8h11.3c-.5 2.7-2 5-4.3 6.5v5.4h7c4.1-3.8 6.4-9.4 6.4-15.9z"/><path fill="#34A853" d="M24 44c5.8 0 10.6-1.9 14.1-5.2l-7-5.4c-1.9 1.3-4.4 2-7.1 2-5.5 0-10.1-3.7-11.8-8.7H5.1v5.5C8.6 39.6 15.8 44 24 44z"/><path fill="#FBBC05" d="M12.2 26.7c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4v-5.5H5.1C3.7 16.3 3 19.1 3 22s.7 5.7 2.1 8.3l7.1-5.6z"/><path fill="#EA4335" d="M24 11.3c3.2 0 6 1.1 8.2 3.2l6.1-6.1C34.5 4.9 29.7 3 24 3 15.8 3 8.6 7.4 5.1 13.7l7.1 5.5C13.9 15 18.5 11.3 24 11.3z"/></svg>`;
        return html`
          <div class="wallet-mini">
            <button class="wallet-mini-btn" onClick=${onAdd} disabled=${loading}>
              ${glyph}
              ${loading ? 'Opening…' : 'Add card to wallet'}
            </button>
          </div>`;
      }

      return html`
        <div class="wallet-buttons">
          <div class="wallet-row">
            <button class="wallet-chip" onClick=${onAddGoogle} disabled=${loadingGoogle}>
              <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#4285F4" d="M44 24c0-1.4-.1-2.7-.4-4H24v8h11.3c-.5 2.7-2 5-4.3 6.5v5.4h7c4.1-3.8 6.4-9.4 6.4-15.9z"/><path fill="#34A853" d="M24 44c5.8 0 10.6-1.9 14.1-5.2l-7-5.4c-1.9 1.3-4.4 2-7.1 2-5.5 0-10.1-3.7-11.8-8.7H5.1v5.5C8.6 39.6 15.8 44 24 44z"/><path fill="#FBBC05" d="M12.2 26.7c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4v-5.5H5.1C3.7 16.3 3 19.1 3 22s.7 5.7 2.1 8.3l7.1-5.6z"/><path fill="#EA4335" d="M24 11.3c3.2 0 6 1.1 8.2 3.2l6.1-6.1C34.5 4.9 29.7 3 24 3 15.8 3 8.6 7.4 5.1 13.7l7.1 5.5C13.9 15 18.5 11.3 24 11.3z"/></svg>
              ${loadingGoogle ? 'Opening\u2026' : 'Google Wallet'}
            </button>
            <button class="wallet-chip" onClick=${onAddApple} disabled=${loadingApple}>
              <svg viewBox="0 0 384 512" fill="#00392c" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
              ${loadingApple ? 'Opening\u2026' : 'Apple Wallet'}
            </button>
          </div>
          <p class="wallet-caption">Add your card to your phone's wallet</p>
        </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // PWA INSTALL ("Add to Home Screen")
    // ════════════════════════════════════════════════════════════════
    // Chrome fires beforeinstallprompt once when the app is installable (and NOT
    // already installed) — stash it so the Android button can call .prompt() on
    // demand. iOS Safari fires nothing, so there we guide the user by hand. Once
    // the app is ever opened standalone (from the home-screen icon) we set a
    // permanent flag, so even iPhone users stop being nudged after they install.
    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredInstallPrompt = e; });
    window.addEventListener('appinstalled', () => { try { localStorage.setItem('pwa_installed', '1'); } catch {} deferredInstallPrompt = null; });
    const pwaIsStandalone = () => { try { return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true; } catch { return false; } };
    const pwaIsInstalled = () => { try { return localStorage.getItem('pwa_installed') === '1'; } catch { return false; } };
    const pwaIsIOS = () => /iPhone|iPad|iPod/i.test(navigator.userAgent);
    // In-app browsers (opening the link from inside Instagram / Facebook / TikTok /
    // etc.) have NO "Add to Home Screen" — the single biggest reason iOS installs
    // fail. Detect them so we can send the user to Safari first.
    const pwaInAppBrowser = () => { try { return /FBAN|FBAV|Instagram|Line\/|TikTok|musical_ly|Snapchat|Pinterest|Twitter|WhatsApp|MicroMessenger|GSA\//i.test(navigator.userAgent || ''); } catch { return false; } };

    // Install guide bottom-sheet. Leads with the real app icon (the payoff), then
    // the right path per platform. Reused by the Home auto-nudge + Profile entry.
    function InstallGuide({ onClose }) {
      return null; // faux preview: suppress PWA install / Add-to-Home-Screen sheet entirely
      const ios = pwaIsIOS();
      const inApp = ios && pwaInAppBrowser();
      const [canPrompt, setCanPrompt] = useState(!!deferredInstallPrompt);
      const [installing, setInstalling] = useState(false);
      // Chrome can fire beforeinstallprompt AFTER the sheet opens — react to it so
      // the one-tap button appears if/when it becomes available.
      useEffect(() => {
        const onBip = () => setCanPrompt(true);
        window.addEventListener('beforeinstallprompt', onBip);
        return () => window.removeEventListener('beforeinstallprompt', onBip);
      }, []);
      const doInstall = async () => {
        if (!deferredInstallPrompt || installing) return;
        setInstalling(true);
        try {
          deferredInstallPrompt.prompt();
          const choice = await deferredInstallPrompt.userChoice;
          if (choice && choice.outcome === 'accepted') { try { localStorage.setItem('pwa_installed', '1'); } catch {} }
        } catch {}
        deferredInstallPrompt = null;
        setInstalling(false);
        onClose && onClose();
      };
      const ua = navigator.userAgent || '';
      const inAppName = /Instagram/i.test(ua) ? 'Instagram' : /FBAN|FBAV/i.test(ua) ? 'Facebook' : /(TikTok|musical_ly)/i.test(ua) ? 'TikTok' : /Snapchat/i.test(ua) ? 'Snapchat' : /MicroMessenger/i.test(ua) ? 'WeChat' : 'this';
      // Chip icons — dark/iOS-blue on a light chip for high contrast (no low-contrast wasabi-on-white).
      const shareIco = html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><rect x="4" y="13" width="16" height="7" rx="2"/></svg>`;
      const addHomeIco = html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/></svg>`;
      const dotsIco = html`<svg class="chip-dots" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>`;
      // one static step row: number + (main + sub) + a chip showing the exact button
      const step = (n, main, sub, chip) => html`<div class="install-step"><span class="install-num">${n}</span><div class="step-txt"><div class="step-main">${main}</div>${sub ? html`<div class="step-sub">${sub}</div>` : null}</div><div class="step-chip">${chip}</div></div>`;
      return html`
        ${/* No tap-outside-to-dismiss (JJ) — only the button closes it. */null}
        <div class="install-overlay" role="dialog" aria-modal="true">
          <div class="install-sheet">
            <div class="install-iconhero"><div class="install-tile"><img src="apple-touch-icon.png" alt="Rolled app icon" /></div><div class="install-lbl">Rolled</div></div>
            ${inApp ? html`
              ${/* In-app browser (IG/FB/TikTok…) has no Add-to-Home-Screen → send to Safari. */null}
              <div class="install-title">Open in Safari first</div>
              <p class="install-sub">You're in the ${inAppName} browser — <b>Add to Home Screen</b> only works in Safari.</p>
              <div class="install-steps">
                ${step('1', html`Tap the <b>•••</b> menu`, 'top-right corner', dotsIco)}
                ${step('2', html`Tap <b>Open in Safari</b>`, 'or "Open in browser"', html`<span class="chip-pill">Safari</span>`)}
                ${step('3', html`Then <b>Share → Add to Home Screen</b>`, 'follow the 3 steps in Safari', shareIco)}
              </div>`
            : ios ? html`
              <div class="install-title">Add Rolled to your home screen</div>
              <p class="install-sub">No app store needed — just 3 taps in Safari:</p>
              <div class="install-steps">
                ${step('1', html`Tap <b>Share</b>`, html`at the bottom of Safari (under <b>•••</b> if hidden)`, shareIco)}
                ${step('2', html`Tap <b>Add to Home Screen</b>`, 'scroll down the list to find it', addHomeIco)}
                ${step('3', html`Tap <b>Add</b>`, 'top-right — and you’re done!', html`<span class="chip-pill">Add</span>`)}
              </div>`
            : canPrompt ? html`
              ${/* Android with Chrome's native prompt available → clean one-tap button. */null}
              <div class="install-title">Add Rolled to your home screen</div>
              <p class="install-sub">No app store needed — just one tap:</p>
              <button class="install-cta" onClick=${doInstall} disabled=${installing}>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
                ${installing ? 'Opening…' : 'Add to Home Screen'}
              </button>
              <p class="install-fallback">Chrome will ask you to confirm — just tap <b>Install</b>.</p>`
            : html`
              ${/* Android/other with no native prompt (already installed, or Chrome didn't offer it) → manual steps. */null}
              <div class="install-title">Add Rolled to your home screen</div>
              <p class="install-sub">No app store needed — it only takes a few taps:</p>
              <div class="install-steps">
                ${step('1', html`Tap the <b>⋮</b> menu`, 'top-right of Chrome', dotsIco)}
                ${step('2', html`Tap <b>Install app</b>`, 'or "Add to Home screen"', addHomeIco)}
                ${step('3', html`Tap <b>Install</b>`, 'it lands on your home screen', html`<span class="chip-pill">Install</span>`)}
              </div>`}
            <button class="install-later" onClick=${onClose}>${inApp ? 'Not now' : 'Maybe later'}</button>
          </div>
        </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // AUTH SCREENS
    // ════════════════════════════════════════════════════════════════
    function LoginScreen({ onLogin, onSwitch, onForgot, showToast }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const handleSubmit = async () => {
        setError(''); setLoading(true);
        try {
          const res = await api('/api/v1/auth/login', { method: 'POST', body: JSON.stringify({ email: email.trim().toLowerCase(), password }) });
          const token = res.access_token || res.token;
          if (!token) { setError('Login succeeded but no token received'); setLoading(false); return; }
          setToken(token); onLogin(res.customer);
        } catch (err) { setError(err.message); }
        setLoading(false);
      };
      return html`
        <div class="auth-screen fade-in">
          <div class="auth-logo"><img src="rolled-logo.svg" alt="Rolled" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'t-hero\\'>ROLLED</span>'" /></div>
          <div class="auth-subtitle">Say G'day to Free Sushi</div>
          ${error ? html`<div class="error-box">${error}</div>` : null}
          <div class="input-group"><label>Email</label><input class="input-field" type="email" placeholder="your@email.com" value=${email} onInput=${e => setEmail(e.target.value)} /></div>
          <div class="input-group"><label>Password</label>
            <div style=${{ position: 'relative' }}>
              <input class="input-field" type=${showPw ? 'text' : 'password'} placeholder="Enter password" value=${password} onInput=${e => setPassword(e.target.value)} onKeyDown=${e => e.key === 'Enter' && handleSubmit()} style=${{ paddingRight: '46px' }} />
              <button type="button" onClick=${() => setShowPw(s => !s)} aria-label=${showPw ? 'Hide password' : 'Show password'}
                style=${{ position: 'absolute', top: '50%', right: '12px', transform: 'translateY(-50%)', background: 'none', border: 'none', padding: '4px', margin: 0, cursor: 'pointer', display: 'flex', alignItems: 'center', color: 'var(--kewpie-dim)', lineHeight: 0 }}>
                ${showPw ? html`
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kewpie-dim)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style=${{ display: 'block' }}><path d="M2 2l20 20"/><path d="M6.7 6.7C4.6 8 3 10 2 12c1.7 3.5 5.5 6 10 6 1.6 0 3.1-.3 4.4-.9"/><path d="M9.9 4.3C10.6 4.1 11.3 4 12 4c4.5 0 8.3 2.5 10 6-.6 1.3-1.5 2.5-2.6 3.5"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
                ` : html`
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kewpie-dim)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style=${{ display: 'block' }}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                `}
              </button>
            </div>
          </div>
          <div style=${{ textAlign: 'right', marginBottom: '14px' }}><button class="btn-text" onClick=${onForgot} style=${{ fontSize: '12px' }}>Forgot password?</button></div>
          <button class="btn btn-primary" onClick=${handleSubmit} disabled=${loading || !email || !password}>${loading ? 'Signing in...' : 'Sign In'}</button>
          <div class="auth-footer">Don't have an account? <button class="link-text" onClick=${onSwitch}>Sign up</button></div>
        </div>`;
    }

    // Wave 14.2 \u2014 Live preview card shown inside the signup flow. Cycles
    // through all 8 stamps once when the customer first types their name
    // (with a small celebration on the 8th), then "rewinds" to settle at the
    // 2 stamps they'll actually receive on signup. Endowed-progress effect:
    // customer sees their name on a card BEFORE submitting + an ambitious
    // preview of the full reward state, then a concrete starter state.
    function SignupPreviewCard({ firstName, handleSettled, triggerNow, bonusStamps = 2, keepFlow }) {
      const trimmed = (firstName || '').trim();
      const hasName = trimmed.length > 0;
      // Phase: 'idle' = no name yet (placeholder card)
      //        'cycling' = animating stamps 0..8
      //        'celebrating' = brief celebration when 8th lands
      //        'settled' = card showing the actual 2 starter stamps
      const [phase, setPhase] = useState('idle');
      const [stampCount, setStampCount] = useState(keepFlow ? bonusStamps : 0);
      // Wave 14.2 design (RESTORED 2026-05-15 after Wave 16 detour):
      // Trigger: Enter-key on the first-name input only (path (b) below).
      // The earlier 800ms-debounce path (a) was removed 2026-05-15 per JJ
      // because it could fire mid-typing when the customer paused to think
      // (e.g. before adding a middle name) — pre-empting the actual commit
      // moment. Enter is the explicit "I'm done typing my name" gesture,
      // and it also blurs the input so the mobile keyboard dismisses BEFORE
      // the celebration plays (so the user actually sees the animation
      // instead of it playing behind the keyboard).
      // firedRef guards one-shot semantics.
      //
      // Why pre-submit (not post-submit): the FREE SUSHI moment is the
      // endowed-progress hook that converts. Customer sees an ambitious
      // preview of the full reward state BEFORE committing, then a
      // concrete starter state. Tested in production for ~6 weeks pre-
      // Wave 16 polish; conversion strong enough that we're not relocating it.
      //
      // Timing (per JJ - fast cycle, savoured celebration):
      //   Stamp cadence: 220ms per stamp = ~1.8s for the full 0->8 fill
      //   Celebration hold: 2400ms - long enough to enjoy the 8/8 state
      //   Rewind to 2:     instant - customer already had their dopamine hit
      const firedRef = useRef(false);
      const startCycle = () => {
        if (firedRef.current) return;
        firedRef.current = true;
        setPhase('cycling');
        let current = keepFlow ? bonusStamps : 0;
        const interval = setInterval(() => {
          current += 1;
          setStampCount(current);
          if (current >= 8) {
            clearInterval(interval);
            setPhase('celebrating');
            setTimeout(() => { setStampCount(bonusStamps); setPhase('settled'); }, 2400);
          }
        }, 220);
      };
      // Enter-key path: parent increments triggerNow on Enter; this effect
      // bypasses the debounce and fires the cycle right now.
      useEffect(() => {
        if (!triggerNow || !hasName) return;
        startCycle();
      }, [triggerNow]);

      // Notify parent when the cycle settles so it can reveal the rest
      // of the form (progressive disclosure: only First Name shown until
      // the name is entered + animation completes). NB: not named
      // `onSettled` because preact treats `on*` props on custom
      // components as DOM event handler bindings and silently drops them.
      const notifiedSettleRef = useRef(false);
      useEffect(() => {
        if (phase === 'settled' && !notifiedSettleRef.current && handleSettled) {
          notifiedSettleRef.current = true;
          handleSettled();
        }
      }, [phase, handleSettled]);

      // Truncate displayed name so a long entry doesn't overflow the card.
      // 20 chars + ellipsis covers virtually every real first name; the
      // INPUT itself isn't capped (we still send the full value to the
      // backend's 100-char limit).
      const NAME_DISPLAY_CAP = 20;
      const cardName = hasName
        ? (trimmed.length > NAME_DISPLAY_CAP ? trimmed.slice(0, NAME_DISPLAY_CAP).toUpperCase() + '…' : trimmed.toUpperCase())
        : 'YOUR NAME';
      let caption;
      // Keep the empty-state caption while the user is still typing (phase
      // stays 'idle' until the 800ms debounce elapses). Avoids a confusing
      // mid-type flash to '0/8 stamps' before the animation actually fires.
      if (phase === 'idle') caption = keepFlow ? `Your Club Card. You're starting with ${bonusStamps} stamps on us.` : 'Roll up for free sushi';
      else if (phase === 'settled') caption = `Your Club Card. You're starting with ${bonusStamps} stamps on us.`;
      else if (phase === 'celebrating') caption = '8/8 \u2014 free sushi!';
      else caption = `${stampCount}/8 stamps`;

      // Wave 14.2 — V2 celebration: confetti burst + FREE SUSHI! text in Gelica.
      // Confetti pieces are generated once per cycle so their random
      // directions/colours feel fresh each time.
      const confettiSeed = phase === 'celebrating' ? Date.now() : 0;
      const confettiPieces = React.useMemo(() => {
        return Array.from({ length: 14 }, (_, i) => {
          const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
          const dist = 70 + Math.random() * 50;
          const colors = ['#d4fb6f', '#fefaf0', '#ffffff'];
          return {
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist,
            rot: (Math.random() - 0.5) * 720,
            color: colors[i % colors.length],
            radius: Math.random() > 0.5 ? '50%' : '2px',
            delay: Math.random() * 0.15,
          };
        });
      }, [confettiSeed]);

      // Soy-fish burst — 4 fish spread outward from centre, slower than the
      // confetti with only a gentle rotation so they read clearly as fish.
      const fishPieces = React.useMemo(() => {
        return Array.from({ length: 4 }, (_, i) => {
          const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
          const dist = 66 + Math.random() * 26;
          return {
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist,
            rot: (Math.random() - 0.5) * 76,   // ±38deg — gentle, not a spin
            size: 22 + Math.random() * 4,
            delay: 0.05 + Math.random() * 0.12,
          };
        });
      }, [confettiSeed]);

      // Sparkle burst — 3 small 4-point stars twinkling outward.
      const sparklePieces = React.useMemo(() => {
        return Array.from({ length: 3 }, (_, i) => {
          const angle = (i / 3) * Math.PI * 2 + Math.random() * 0.6;
          const dist = 52 + Math.random() * 34;
          return {
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist,
            size: 12 + Math.random() * 6,
            color: i % 2 === 0 ? '#fefaf0' : '#ffffff',
            delay: Math.random() * 0.2,
          };
        });
      }, [confettiSeed]);

      return html`
        <div style=${{
          margin: '8px auto 22px',
          maxWidth: '320px',
          width: '100%',
          padding: '0 0 16px',
          borderRadius: 'var(--r-lg)',
          background: 'linear-gradient(180deg, rgba(212,251,111,0.06) 0%, rgba(0,57,44,0.18) 100%)',
          border: '1px solid rgba(212,251,111,0.28)',
          transition: 'transform 250ms ease-out, box-shadow 250ms ease-out',
          transform: phase === 'celebrating' ? 'scale(1.04)' : 'scale(1)',
          boxShadow: phase === 'celebrating'
            ? '0 18px 40px rgba(0,0,0,0.4), 0 0 28px rgba(212,251,111,0.4)'
            : '0 14px 32px rgba(0,0,0,0.32), 0 0 0 1px rgba(212,251,111,0.12), 0 0 18px rgba(212,251,111,0.12)',
          /* Wiggle once on mount to draw the eye to the card. */
          animation: 'signupCardWiggle 0.65s ease-out 1',
          position: 'relative',
          overflow: 'hidden',
          /* Wave 14.2 — prevent parent flex from squishing the card when the
             rest of the form reveals (was collapsing to 34px tall). */
          flexShrink: 0,
        }}>
          ${phase === 'celebrating' ? html`
            ${/* 9d — wasabi radial bloom behind the burst (blooms + fades once) */null}
            <div style=${{
              position: 'absolute',
              top: '46%',
              left: '50%',
              width: '220px',
              height: '220px',
              transform: 'translate(-50%, -50%) scale(0)',
              background: 'radial-gradient(circle, rgba(212,251,111,0.5), rgba(212,251,111,0) 66%)',
              pointerEvents: 'none',
              zIndex: 1,
              animation: 'signupWasabiBloom 1500ms ease-out 1 forwards',
            }}/>
            ${/* 9e — diagonal white sheen sweeping across the card once */null}
            <div style=${{
              position: 'absolute',
              top: 0,
              bottom: 0,
              left: 0,
              width: '55%',
              background: 'linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.28) 50%, rgba(255,255,255,0) 100%)',
              pointerEvents: 'none',
              zIndex: 3,
              transform: 'translateX(-120%) skewX(-18deg)',
              animation: 'signupCardSheen 1400ms ease-out 200ms 1 forwards',
            }}/>
            <div style=${{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 4 }}>
              ${confettiPieces.map((p, i) => html`
                <div key=${i} style=${{
                  position: 'absolute',
                  top: '50%',
                  left: '50%',
                  width: '8px',
                  height: '14px',
                  background: p.color,
                  borderRadius: p.radius,
                  transform: 'translate(-50%, -50%) scale(0)',
                  animation: 'confettiBurstSignup 1800ms ease-out ' + p.delay + 's 1 forwards',
                  '--dx': p.dx + 'px',
                  '--dy': p.dy + 'px',
                  '--rot': p.rot + 'deg',
                }}/>
              `)}
              ${/* 9b — soy-fish bursting outward, slower + gentle rotation */null}
              ${fishPieces.map((p, i) => html`
                <div key=${'fish' + i} style=${{
                  position: 'absolute',
                  top: '50%',
                  left: '50%',
                  width: p.size + 'px',
                  height: p.size + 'px',
                  transform: 'translate(-50%, -50%) scale(0.3)',
                  animation: 'signupFishBurst 2100ms ease-out ' + p.delay + 's 1 forwards',
                  '--dx': p.dx + 'px',
                  '--dy': p.dy + 'px',
                  '--rot': p.rot + 'deg',
                }}>
                  <${SoyFishMini} filled=${true} />
                </div>
              `)}
              ${/* 9c — sparkles bursting outward (4-point stars) */null}
              ${sparklePieces.map((p, i) => html`
                <div key=${'spk' + i} style=${{
                  position: 'absolute',
                  top: '50%',
                  left: '50%',
                  width: p.size + 'px',
                  height: p.size + 'px',
                  transform: 'translate(-50%, -50%) scale(0)',
                  animation: 'signupSparkleBurst 1700ms ease-out ' + p.delay + 's 1 forwards',
                  '--dx': p.dx + 'px',
                  '--dy': p.dy + 'px',
                }}>
                  <svg viewBox="0 0 24 24" width=${p.size} height=${p.size} style=${{ display: 'block' }}><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill=${p.color}/></svg>
                </div>
              `)}
            </div>
          ` : null}
          ${/* Wave 14.2 — card header zone with wave-line pattern behind eyebrow + name, mirroring the live customer card chrome. */null}
          <div style=${{
            position: 'relative',
            padding: '14px 18px 10px',
            marginBottom: '12px',
            borderBottom: '1px solid rgba(212,251,111,0.15)',
            overflow: 'hidden',
            minHeight: '56px',
          }}>
            <${SignupCardWaveLines} />
            <div style=${{ position: 'relative', zIndex: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '10px' }}>
              <div style=${{ minWidth: 0, flex: 1 }}>
                <div style=${{ fontSize: '9px', fontWeight: 800, letterSpacing: '1.5px', color: 'rgba(254,250,240,0.55)', textTransform: 'uppercase' }}>Rolled Club Card</div>
                <div style=${{ fontFamily: 'var(--fd)', fontSize: '17px', fontWeight: 700, color: 'var(--kewpie)', marginTop: '2px', letterSpacing: '0.5px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>${cardName}</div>
              </div>
            </div>
          </div>
          <div style=${{ padding: '0 18px' }}>
          ${/* Stamps grid wrapped in a position:relative container so the
             FREE SUSHI! celebration text can sit absolute-positioned in the
             middle (which lands naturally in the gap between the two rows of
             fish, since a 4x2 grid with even rows centres at the gap). */null}
          <div style=${{ position: 'relative', marginBottom: '10px' }}>
            <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px' }}>
              ${Array.from({ length: 8 }, (_, i) => html`
                <div key=${i} class="signup-preview-stamp" style=${{
                  width: '100%',
                  aspectRatio: '1',
                  maxWidth: '68px',
                  margin: '0 auto',
                  opacity: i < stampCount ? 1 : 0.25,
                  transition: 'opacity 340ms ease-out, transform 200ms ease-out',
                  transform: phase === 'cycling' && i === stampCount - 1 ? 'scale(1.15)' : 'scale(1)',
                }}>
                  <${SoyFishMini} filled=${i < stampCount} />
                </div>
              `)}
            </div>
            ${phase === 'celebrating' ? html`
              <div style=${{
                position: 'absolute',
                top: '50%',
                left: 0,
                right: 0,
                transform: 'translateY(-50%)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                pointerEvents: 'none',
                zIndex: 5,
                fontFamily: 'gelica, serif',
                fontSize: '32px',
                fontWeight: 800,
                color: '#d4fb6f',
                letterSpacing: '1px',
                textShadow: '0 0 16px rgba(212,251,111,0.7), 0 2px 8px rgba(0,0,0,0.4)',

    function ForgotPasswordScreen({ onBack }) {
      const [email, setEmail] = useState(''); const [loading, setLoading] = useState(false); const [sent, setSent] = useState(false); const [error, setError] = useState('');

    // ════════════════════════════════════════════════════════════════
    // CLAIM-LINK SCREEN — /claim?token=<TOKEN> (backend PR #83)
    // A claim link grants a special-card TYPE (minted in the Command
    // Centre, sent by DM / email / printed QR). This screen previews the
    // link via the PUBLIC endpoint (works signed-out), then routes:
    //   signed-in  → confirm → POST /me/claim-link → success/error
    //   signed-out → signup (token rides the POST body as cardClaimToken)
    //                or login (then auto-claim, no second confirm)
    // ALL COPY BELOW IS GREY-BOX PLACEHOLDER — JJ owns wording + visuals.
    // ════════════════════════════════════════════════════════════════
    // Per-reason copy for a link that can't be claimed. Shared by the
    // preview (invalid) and the claim POST (claim_failed) states.
    const CLAIM_REASON_COPY = {
      not_found:     { title: 'That link doesn’t look right', body: 'We couldn’t find this claim link — it may have been mistyped or switched off. Double-check the link you were sent.' },
      paused:        { title: 'This link is on pause', body: 'This claim link is taking a breather right now. Check back later, or ask whoever sent it.' },
      expired:       { title: 'This link has expired', body: 'This claim link is past its use-by date. Ask whoever sent it for a fresh one.' },
      fully_claimed: { title: 'All claimed, mate', body: 'Every card on this link has already been snapped up.' },
      card_unavailable: { title: 'This reward isn’t available right now', body: 'This card’s been paused. Check back soon, or give us a shout.' },
    };

    function ClaimLinkScreen({ token, isSignedIn, autoClaim, profile, onJoin, onLoginInstead, onDone, onClaimed }) {
      // phase: loading → (valid | invalid | error) → claiming → (claimed | claim_failed)
      const [phase, setPhase] = useState('loading');
      const [reason, setReason] = useState(null);        // invalid/claim_failed reason key
      const [cardInfo, setCardInfo] = useState(null);    // preview: { key, display_name, reward_description }
      const [claimResult, setClaimResult] = useState(null); // claim: { card, already_active }
      const [retryTick, setRetryTick] = useState(0);
      const claimFired = useRef(false);

      // Public preview — no auth needed. 200 { valid, reason, card }; a
      // malformed token 404s with the same shape (no card). A network blip
      // gets its own retryable state — it must NOT claim the link is dead.
      useEffect(() => {
        let alive = true;
        setPhase('loading');
        (async () => {
          try {
            const res = await api('/api/v1/claim-links/' + encodeURIComponent(token));
            if (!alive) return;
            // A per-person Rolled Legends link carries the creator's handle (set by
            // the team at mint) so the claim screen greets them by name before they
            // even have an account. NULL for every other link.
            if (res && res.card) setCardInfo({ ...res.card, instagram_handle: res.instagram_handle || null, tiktok_handle: res.tiktok_handle || null });
            if (res && res.valid) { setPhase('valid'); }
            else { setReason((res && res.reason) || 'not_found'); setPhase('invalid'); }
          } catch (err) {
            if (!alive) return;
            if (err && err.status === 404) { setReason('not_found'); setPhase('invalid'); }
            else { setPhase('error'); }
          }
        })();
        return () => { alive = false; };
      }, [token, retryTick]);

      const doClaim = useCallback(async () => {
        setPhase('claiming');
        try {
          const res = await api('/api/v1/customers/me/claim-link', { method: 'POST', body: JSON.stringify({ token }) });
          setClaimResult(res);
          setPhase('claimed');
          // Signal the App which card was just claimed so the next Home visit
          // reveals + swipe-coaches to it (mirrors the signup path). Prefer the
          // authored card_type from the claim response; fall back to the preview
          // key. Fires for already-active too — the card is in their Collection.
          if (onClaimed) {
            const claimedType = (res && res.card && res.card.card_type) || (cardInfo && cardInfo.key) || null;
            if (claimedType) onClaimed(claimedType);
          }
        } catch (err) {
          setReason((err && err.reason) || null);
          setPhase('claim_failed');
        }
      }, [token, onClaimed, cardInfo]);

      // Post-login auto-claim: the visitor came BACK through the login path
      // this screen offered, so don't make them confirm twice.
      useEffect(() => {
        if (phase === 'valid' && isSignedIn && autoClaim && !claimFired.current) {
          claimFired.current = true;
          doClaim();
        }
      }, [phase, isSignedIn, autoClaim, doClaim]);

      // Small card preview — reuse the real special-card face inside the
      // Collection's calmed wrapper (single column, scaled down). Unknown
      // card types fall through to PlaceholderFace via SpecialCardFace.
      // centre_name rides the preview for Centre Worker links (which kiosk minted
      // it) so the gate card shows the real centre, not the generic fallback.
      const faceCard = cardInfo ? { card_type: cardInfo.key, display_name: cardInfo.display_name, status: 'available', centre_name: cardInfo.centre_name || '', available_until: cardInfo.available_until || '' } : null;
      const cardBlock = faceCard ? html`
        <div class="collection-cards" style=${{ gridTemplateColumns: '1fr', width: '100%', maxWidth: '230px', margin: '0 auto 18px' }}>
          <div class="coll-facebox"><${SpecialCardFace} card=${faceCard} profile=${profile} /></div>
        </div>` : null;
      const rewardLine = cardInfo && cardInfo.reward_description ? html`<p class="t-body c-muted" style=${{ marginBottom: '18px' }}>${cardInfo.reward_description}</p>` : null;
      // Rolled Legends: the creator's handle rides the link, so the claim screen
      // greets them by name. Only Legends links carry one, so this is empty for
      // every other card. GREY-BOX copy — JJ owns the final wording.
      const rawClaimHandle = cardInfo ? (cardInfo.instagram_handle || cardInfo.tiktok_handle || '') : '';
      const claimHandle = rawClaimHandle ? '@' + String(rawClaimHandle).replace(/^@+/, '') : '';
      // For a Rolled Legends link, the title below the card leads with the creator's
      // handle instead of the generic card name — the personal touch sits where the
      // "Rolled Legends Card" line was, above the reward line (JJ, 20 Jul).
      const claimTitle = claimHandle
        ? html`G’day <span style=${{ color: 'var(--wasabi)' }}>${claimHandle}</span>, here’s your Legends Card`
        : ((cardInfo && cardInfo.display_name) || 'Special card');
      const logo = html`<div class="auth-logo"><img src="rolled-logo.svg" alt="Rolled" /></div>`;
      const wrap = (inner) => html`<div class="auth-screen fade-in" style=${{ textAlign: 'center' }}>${logo}${inner}</div>`;

      if (phase === 'loading') return wrap(html`
        <div style=${{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '14px', marginTop: '24px' }}>
          <div class="spinner"></div>
          <p class="t-body c-muted">Checking your link…</p>
        </div>`);

      if (phase === 'error') return wrap(html`
        <div class="t-title" style=${{ marginBottom: '10px' }}>Couldn’t check that link</div>
        <p class="t-body c-muted" style=${{ marginBottom: '24px' }}>Something got in the way — might just be your connection. Give it another go.</p>
        <button class="btn btn-primary" onClick=${() => setRetryTick(t => t + 1)}>Try again</button>
        <div style=${{ marginTop: '14px' }}><button class="btn-text" onClick=${() => onDone()}>Continue to the app</button></div>`);

      if (phase === 'invalid' || (phase === 'claim_failed' && reason)) {
        const copy = CLAIM_REASON_COPY[reason] || CLAIM_REASON_COPY.not_found;
        return wrap(html`
          <div style=${{ fontSize: '40px', marginBottom: '12px' }}>\u{1F363}</div>
          <div class="t-title" style=${{ marginBottom: '10px' }}>${copy.title}</div>
          <p class="t-body c-muted" style=${{ marginBottom: '24px' }}>${copy.body}</p>
          <button class="btn btn-primary" onClick=${() => onDone()}>Continue to the app</button>`);
      }

      if (phase === 'claim_failed') return wrap(html`
        <div class="t-title" style=${{ marginBottom: '10px' }}>That didn’t land</div>
        <p class="t-body c-muted" style=${{ marginBottom: '24px' }}>Something went sideways while claiming your card. Give it another go.</p>
        <button class="btn btn-primary" onClick=${doClaim}>Try again</button>
        <div style=${{ marginTop: '14px' }}><button class="btn-text" onClick=${() => onDone()}>Not now</button></div>`);

      if (phase === 'claiming') return wrap(html`
        <div style=${{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '14px', marginTop: '24px' }}>
          <div class="spinner"></div>
          <p class="t-body c-muted">Claiming your card…</p>
        </div>`);

      if (phase === 'claimed') {
        const already = claimResult && claimResult.already_active;
        // Card-as-hero: render the REAL just-claimed SpecialCardFace as the
        // celebration. Identity comes from the claim response (authored
        // card_type) with a fallback to the preview key; display_name likewise.
        const claimedCard = (claimResult && claimResult.card) || null;
        const heroType = (claimedCard && claimedCard.card_type) || (cardInfo && cardInfo.key) || null;
        const heroName = (claimedCard && claimedCard.display_name) || (cardInfo && cardInfo.display_name) || 'Your new card';
        const heroFace = heroType ? { card_type: heroType, display_name: heroName, status: 'available', centre_name: (cardInfo && cardInfo.centre_name) || '', available_until: (cardInfo && cardInfo.available_until) || '' } : faceCard;
        // GREY-BOX copy — JJ owns final wording. Kept simple + adaptive: a
        // celebratory line + the card's display_name beneath.
        const headline = already ? 'Already in your Collection' : 'Card claimed!';
        const subline = already
          ? 'No double-ups needed — it’s already yours.'
          : 'It’s loaded onto your account.';
        return wrap(html`
          <div class="cc-hero">
            ${heroFace ? html`
              <div class="cc-hero-card">
                <div class="coll-facebox"><${SpecialCardFace} card=${heroFace} profile=${profile} /></div>
              </div>` : null}
            <div class="cc-tick"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg></div>
          </div>
          <div class="cc-headline">
            <div class="t-title" style=${{ marginBottom: '6px' }}>${headline}</div>
            <div class="t-body" style=${{ color: 'var(--kewpie)', fontWeight: 600, marginBottom: '4px' }}>${heroName}</div>
            <p class="t-body c-muted" style=${{ marginBottom: '24px' }}>${subline}</p>
          </div>
          <button class="btn btn-primary" onClick=${() => onDone('collection')}>See my Collection</button>
          <div style=${{ marginTop: '14px' }}><button class="btn-text" onClick=${() => onDone()}>Back to Home</button></div>`);
      }

      // phase === 'valid'
      if (!isSignedIn) return wrap(html`
        <div class="auth-subtitle" style=${{ marginBottom: '16px' }}>${claimHandle ? 'You’re a certified Legend.' : 'You’ve been sent a special card'}</div>
        ${cardBlock}
        <div class="t-title" style=${{ marginBottom: '6px' }}>${claimTitle}</div>
        ${rewardLine}
        <button class="btn btn-primary" onClick=${() => onJoin(cardInfo)}>Join the Club and claim it</button>
        <div class="auth-footer">Already a member? <button class="link-text" onClick=${() => onLoginInstead()}>Log in to claim</button></div>`);

      return wrap(html`
        <div class="auth-subtitle" style=${{ marginBottom: '16px' }}>${claimHandle ? 'You’re a certified Legend.' : ('G’day' + (profile && profile.first_name ? ' ' + profile.first_name : '') + ', wrap your laughing gear ’round this')}</div>
        ${cardBlock}
        <div class="t-title" style=${{ marginBottom: '6px' }}>${claimTitle}</div>
        ${rewardLine}
        <button class="btn btn-primary" onClick=${doClaim}>Add it to my Collection</button>
        <div style=${{ marginTop: '14px' }}><button class="btn-text" onClick=${() => onDone()}>Not now</button></div>`);
    }

    // ════════════════════════════════════════════════════════════════
    // CONFETTI + ROO + PARTY POPPER
    // ════════════════════════════════════════════════════════════════
    const CONFETTI_COLORS = ['#d4fb6f', '#fefaf0', '#D4A017', '#4ade80', '#B9F2FF'];
    function CelebrationConfetti() {
      const wrapRef = useRef(null);
      const pieces = React.useMemo(() => Array.from({ length: 60 }, (_, i) => { const fromLeft = i % 2 === 0; const size = 6 + Math.random() * 10; return { fromLeft, top: `${15 + Math.random() * 55}%`, bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length], delay: `${Math.random() * 0.4}s`, duration: `${1 + Math.random() * 1.2}s`, size: `${size}px`, radius: Math.random() > 0.5 ? '50%' : '2px' }; }), []);
      useEffect(() => { const t = setTimeout(() => { if (wrapRef.current) { wrapRef.current.style.transition = 'opacity 0.4s'; wrapRef.current.style.opacity = '0'; } }, 1600); return () => clearTimeout(t); }, []);
      return html`<div ref=${wrapRef} class="confetti-wrap">${pieces.map((p, i) => html`<div key=${i} class="confetti-piece" style=${{ [p.fromLeft ? 'left' : 'right']: '-10px', top: p.top, width: p.size, height: p.size, background: p.bg, borderRadius: p.radius, animation: `${p.fromLeft ? 'confettiFromLeft' : 'confettiFromRight'} ${p.duration} cubic-bezier(0.25, 0.46, 0.45, 0.94) ${p.delay} forwards` }} />`)}</div>`;

      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const W = el.clientWidth || 320, H = el.clientHeight || 130;
        let out = '';
        const place = (n, cls, smin, srange, dmin, dstep, dmod) => {
          const cols = Math.max(1, Math.round(Math.sqrt(n * W / H))), rows = Math.ceil(n / cols);
          const cw = W / cols, ch = H / rows;
          for (let i = 0; i < n; i++) {
            const col = i % cols, row = Math.floor(i / cols);
            const jx = (((i * 53) % 100) / 100 - 0.5), jy = (((i * 37) % 100) / 100 - 0.5);

    // ════════════════════════════════════════════════════════════════
    // HOME SCREEN — Option C Card Layout
    // ════════════════════════════════════════════════════════════════
    function HomeScreen({ profile, card, stamps, onRefresh, showToast, marketingCopy, onNavigate, firstRunHint, claimedCardType, onFirstRunConsumed, onSignUp }) {
      const mCopy = marketingCopy || MARKETING_COPY_FALLBACK;
      const walletDismissKey = profile?.id ? `wallet_dismissed:${profile.id}` : null;
      const [walletDismissed, setWalletDismissed] = useState(() => walletDismissKey && localStorage.getItem(walletDismissKey) === '1');
      const dismissWallet = () => { if (walletDismissKey) localStorage.setItem(walletDismissKey, '1'); setWalletDismissed(true); };
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      // PWA install nudge — auto-open once on Home when not installed + not snoozed.
      // "Maybe later" snoozes 14 days; a permanent entry also lives in Profile.
      const [showInstall, setShowInstall] = useState(false);
      const closeInstall = () => { setShowInstall(false); try { localStorage.setItem('pwa_install_snooze', String(Date.now() + 14 * 24 * 60 * 60 * 1000)); } catch {} };
      // True while a fresh-claim reveal owns the first Home moment: seeded from a
      // pending claim (claimedCardType is set on mount for signup OR tap claims)
      // and only released when the reveal/coach finishes (see the coach effect).
      // The install nudge waits on this so it never pops on top of the reveal —
      // claimedCardType alone isn't enough because the reveal CONSUMES it
      // (clears state) almost immediately, which would otherwise re-open the gate.
      const [claimRevealPending, setClaimRevealPending] = useState(() => !!claimedCardType);
      useEffect(() => { if (claimedCardType) setClaimRevealPending(true); }, [claimedCardType]);
      useEffect(() => {
        if (!isMobile || pwaIsStandalone() || pwaIsInstalled()) return;
        // In-app browsers (WhatsApp / Instagram / Facebook / etc.) can't install a
        // PWA at all, AND their storage is isolated so the real pwa_installed flag
        // from an earlier Safari/Chrome install isn't visible here — so the nudge
        // used to wrongly re-appear. Jess hit this tapping a claim link from
        // WhatsApp. Never nudge inside an in-app browser.
        if (pwaInAppBrowser()) return;
        // Don't pop the install sheet on top of a fresh-claim reveal — the reveal
        // owns the first Home moment until its coach finishes.
        if (claimRevealPending) return;
        try { const snooze = parseInt(localStorage.getItem('pwa_install_snooze') || '0', 10); if (Date.now() < snooze) return; } catch {}
        const t = setTimeout(() => setShowInstall(true), 1200);
        return () => clearTimeout(t);
      }, [claimRevealPending]);
      const showWalletPrompt = isMobile && !walletDismissed;

      // Wave 14.5 — configurable marketing-prompt triggers.
      // Replaces Wave 10's hardcoded post-reward popup. Server-side
      // /api/v1/marketing-prompts/eligible decides which of the 4 triggers
      // (post_reward / post_tier_upgrade / post_6_of_8 / post_birthday_card)
      // fires for this customer right now — eligibility chains active toggle,
      // opt-in status, trigger-specific state, cooldown window, and the
      // re-issue-if-dismissed rule. Customer-app shows index 0 (highest
      // priority) and logs fired/dismissed/converted via POST /event.
      //
      // Why this isn't just "post_reward + 3 sibling popups": cooldown +
      // analytics need server-side truth that survives cache clears + works
      // across the customer's devices. Wave 10's sessionStorage flag did
      // neither.
      const [marketingPrompt, setMarketingPrompt] = useState(null);
      const [marketingPromptSaving, setMarketingPromptSaving] = useState(false);
      const marketingPromptFiredRef = useRef(false);

      // Phase 7d — Special cards held by this customer + redemption state.
      //   specialCards    : array of cards from GET /me/special-cards
      //   redeemingCard   : the card the customer's actively redeeming, or null
      //   prevStatusRef   : tracks the redeeming card's status across polls so
      //                     we can detect "available → cap_daily / cap_*" =
      //                     a successful scan + auto-close the modal.
      const [specialCards, setSpecialCards] = useState(_specialCardsCache);
      const [redeemingCard, setRedeemingCard] = useState(null);
      const [celebrating, setCelebrating] = useState(false);
      const [celebrateHeld, setCelebrateHeld] = useState(false);
      const prevRedeemingStatusRef = useRef(null);
      const prevRedeemingTimeRef = useRef(null);

      const reloadSpecialCards = useCallback(async () => {
        try {
          const res = await api('/api/v1/customers/me/special-cards');
          // Only replace the list on a clean, well-formed success. A malformed
          // body leaves the current cards untouched.
          if (res && Array.isArray(res.cards)) { const cards = homeDeckCards(res.cards); _specialCardsCache = cards; setSpecialCards(cards); }
        } catch (e) {
          // Transient error (rate-limit / network / 5xx) — KEEP whatever cards
          // are already on screen instead of blanking them. They refresh on the
          // next successful poll. (Bug: a 429 after navigating used to wipe them.)
        }
      }, []);

      useEffect(() => {
        if (!profile || !profile.id) return;
        reloadSpecialCards();
      }, [profile?.id, reloadSpecialCards]);

      // Poll /me/special-cards while the redemption modal is open. When the
      // active card's status flips from 'available' (typically to 'cap_daily'
      // or similar — meaning the scan landed and the cap was hit), we treat
