    .sf-pill { font-family: var(--fb); font-weight: 600; font-size: 3cqw; letter-spacing: .3px; border: 1px solid var(--nori); border-radius: 999px; padding: 1cqw 2.6cqw; opacity: .9; white-space: nowrap; color: var(--nori); }
    .sf-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .sf-fs { font-family: var(--fb); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 6cqw; }
    .sf-fl { font-family: var(--fd); font-style: italic; font-weight: 600; font-size: 15cqw; line-height: .88; }
    .sf-name-c { font-family: var(--fb); font-weight: 600; text-transform: uppercase; letter-spacing: 2.4px; font-size: 3.3cqw; }
    .sf-hero { font-family: var(--fd); font-weight: 600; font-size: 11cqw; line-height: .95; }
    .sf-name-l { font-family: var(--fb); font-weight: 600; font-size: 3.8cqw; letter-spacing: .3px; margin-top: 1.4cqw; }
    .sf-dob { opacity: .6; font-weight: 500; }
    @keyframes sfSheen { 0% { background-position: 150% 0; } 45% { background-position: -60% 0; } 100% { background-position: -60% 0; } }
    @keyframes sfHolo { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* ── Position dots ─────────────────────────────────── */
    .carousel-dots { display: flex; justify-content: center; align-items: center; gap: 7px; margin-top: 8px; }
    .carousel-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--kewpie-faint); border: none; padding: 0; cursor: pointer;
      transition: width 0.25s var(--ease), background 0.25s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .carousel-dot.is-active { width: 20px; border-radius: 4px; background: var(--wasabi); }

    /* ── Context area (swaps with centred card) ──────────
       Reserves ONE fixed floor height across every state so the
       run of content below the dots stays put as you swipe between
       the club card and special cards (the bottom nav is pinned to
       the app shell, so it never moves regardless). After the Phase-7e2
       compaction the club view and special claim states share this one
       floor so nothing jumps when swiping; the floor is sized to the
       tallest compacted state (the armed special, ~342px measured). */
    .home-context { position: relative; margin-top: 6px; min-height: 300px; display: flex; flex-direction: column; }
    .context-pane { display: flex; flex-direction: column; flex: 1; }
    /* Anchor the special-card claim content just under the dots (like the club
       view) instead of floating it in the middle of the reserved floor, so it
       reads as attached to the card above. A small top gap gives it air. */
    .context-pane.claim-flow { justify-content: flex-start; padding-top: 6px; }

    /* ── Special-card claim flow ───────────────────────── */
    .claim-flow { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .claim-head { margin-bottom: 8px; }
    .claim-name { font-family: var(--fd); font-size: 19px; font-weight: 700; color: var(--kewpie); letter-spacing: 0.3px; }
    /* Legends "YOUR REWARD" header — mirrors the club card's own reward strip so it reads
       identically when a Legend has a sent reward waiting to claim. */
    .claim-yr-eyebrow { font-family: var(--fb); font-size: 9.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--wasabi); margin: 0; opacity: 0.9; }
    .claim-yr-val { font-family: var(--fd); font-size: 19px; font-weight: 700; color: var(--kewpie); letter-spacing: 0.3px; margin: 2px 0 0; }
    .claim-reward { font-size: 12px; color: var(--kewpie-muted); margin-top: 3px; line-height: 1.38; max-width: 290px; }
    .claim-box {
      position: relative;
      width: 150px; height: 150px;
      border-radius: var(--r-xl);
      /* Thick textured frame that matches the card finish: the card's
         colour/gradient (--box-frame) paints the border via border-box,
         while the inner surface (--box-bg) paints the centre via padding-box. */
      border: 6px solid transparent;
      background:
        linear-gradient(var(--box-bg, var(--kewpie)), var(--box-bg, var(--kewpie))) padding-box,
        var(--box-frame, var(--accent, var(--wasabi))) border-box;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 18px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    /* Unclicked (pre-claim) box: club-card wave pattern on Nori instead of a
       flat off-white surface, so the special QR card feels on-brand. */
    .claim-box--wave { --box-bg: var(--nori); }
    /* "Claimed" state (FS4L daily / Legends one-time / Birthday after claim) — a
       clean done state: card-finish frame, a tick + "Claimed". Simple, satisfying. */
    .claim-box--claimed { --box-bg: var(--nori); }
    .claim-box--claimed .claim-claimed-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 100%; text-align: center; padding: 10px; }
    .claim-box--claimed .claim-claimed-tick { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--box-frame, var(--accent, var(--wasabi))); }
    .claim-box--claimed .claim-claimed-tick svg { width: 24px; height: 24px; stroke: var(--claim-ink, var(--nori)); }
    .claim-box--claimed .claim-claimed-label { font-family: var(--fd); font-size: 21px; font-weight: 700; color: var(--kewpie); }
    /* Aspirational "coming soon" (Birthday before it unlocks / after claim → next
       birthday) — the card's holographic finish SHIFTS (sfHolo) for a live, premium
       feel, with a single "Unlocks on <date>" pill. Not a lock. */
    @property --soon-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    .claim-box--soon { position: relative; overflow: hidden; border: none; background: none; }
    .claim-box--soon .claim-soon-holo { position: absolute; inset: 0; z-index: 1; border-radius: inherit; background: var(--box-frame, var(--accent, var(--wasabi))); background-size: 300% 300%; animation: sfHolo 5.5s ease-in-out infinite; }
    /* Bright shimmer travels CLOCKWISE around the outline (conic rotated via @property,
       masked to a thin ring so only the border lights up). */
    .claim-box--soon .soon-shine { position: absolute; inset: 0; z-index: 3; border-radius: inherit; pointer-events: none; padding: 3px;
      background: conic-gradient(from var(--soon-angle), rgba(255,255,255,0.42) 0deg, rgba(255,255,255,0.42) 278deg, #fff 320deg, rgba(255,255,255,0.42) 360deg);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude;
      animation: soonSpin 6s linear infinite; }
    @keyframes soonSpin { to { --soon-angle: 360deg; } }
    /* Founders armed QR — a bright gold light sweeps CLOCKWISE around the QR
       frame (same masked-conic ring as the soon shimmer, in gold, faster). It
       rides ON TOP of the static gold --box-frame so it reads as a light
       travelling the border. */
    @property --armed-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    .claim-box--armed .claim-armed-shine {
      position: absolute; inset: 0; z-index: 5; border-radius: inherit; pointer-events: none; padding: 4px;
      background: conic-gradient(from var(--armed-angle), transparent 0deg, transparent 262deg, rgba(255,246,216,0.85) 306deg, #fff8e0 330deg, rgba(255,246,216,0.85) 354deg, transparent 360deg);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude;
      animation: armedSpin 2.6s linear infinite;
    }
    @keyframes armedSpin { to { --armed-angle: 360deg; } }
    @media (prefers-reduced-motion: reduce) { .claim-box--armed .claim-armed-shine { animation: none; } }
    .claim-box--soon .claim-soon { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 12px; }
    .claim-box--soon .claim-soon-pill { font-family: var(--fb); font-size: 12px; font-weight: 800; letter-spacing: 0.2px; color: var(--nori); background: rgba(255,255,255,0.9); padding: 9px 15px; border-radius: 999px; box-shadow: 0 3px 10px rgba(0,0,0,0.18); text-align: center; line-height: 1.35; }
    @media (prefers-reduced-motion: reduce) { .claim-box--soon .claim-soon-holo, .claim-box--soon .soon-shine { animation: none; } }
    /* Claim celebration — the card's colour floods the box, a sheen sweeps,
       then "You Beauty!" lands. Fires the instant the scan is detected; holds
       ~45s then returns to Claim (or the card's locked state for capped). */
    .claim-claimed { cursor: pointer; }
    .claim-flood { position: absolute; inset: 0; z-index: 1; border-radius: 50%;
      background: var(--box-frame, var(--accent, var(--wasabi)));
      transform: scale(0); animation: claimFlood 0.55s cubic-bezier(.4,0,.2,1) forwards; }
    .claim-flood-sheen { position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,.6) 50%, transparent 62%);
      transform: translateX(-130%); animation: claimSheen 0.65s 0.18s ease-out; }
    .claim-payoff { position: relative; z-index: 3; text-align: center; opacity: 0;
      transform: scale(.82) translateY(6px); animation: claimPayoff 0.5s 0.5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .claim-payoff-big { font-family: var(--fd); font-style: italic; font-weight: 700;
      font-size: 27px; line-height: .92; color: var(--claim-ink, var(--nori)); }
    .claim-payoff-sub { font-family: var(--fb); font-weight: 800; font-size: 9.5px; letter-spacing: 1px;
      text-transform: uppercase; margin-top: 8px; color: var(--claim-ink, var(--nori)); opacity: .68; }
    @keyframes claimFlood { to { transform: scale(2.4); } }
    @keyframes claimSheen { to { transform: translateX(130%); } }
    @keyframes claimPayoff { to { opacity: 1; transform: scale(1) translateY(0); } }
    /* Held state — after the one-shot play, the box re-renders static (no
       animation) so swiping away + back doesn't replay it. Final values match
       the keyframe end-states, so freezing is seamless. */
    .claim-claimed.is-held .claim-flood { transform: scale(2.4); animation: none; }
    .claim-claimed.is-held .claim-flood-sheen { animation: none; opacity: 0; }
    .claim-claimed.is-held .claim-payoff { opacity: 1; transform: scale(1) translateY(0); animation: none; }

    @media (prefers-reduced-motion: reduce) { .faux-cel-hero, .faux-cel-fish, .faux-cel-spark, .faux-cel-bloom, .faux-cel-title, .faux-cel-sub { animation-duration: 0.01ms !important; animation-delay: 0s !important; opacity: 1 !important; } }
    @media (prefers-reduced-motion: reduce) {

    .claim-box .redeem-qr-wrap { padding: 0; }

    .claim-locked { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 16px 14px; }

    /* RedemptionQR neutral surface (reused inside the claim box) */

    .wallet-buttons { display: flex; flex-direction: column; align-items: center; margin: 10px 0 6px; }

    /* ── Profile Stats ─────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0; }
    .stat-box { background: var(--nori-dark); border-radius: var(--r-lg); padding: 16px 8px; text-align: center; border: 1px solid var(--kewpie-faint); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .stat-value { font-family: var(--fd); font-size: 24px; font-weight: 700; color: var(--wasabi); line-height: 1; }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--kewpie-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; }

    /* ── History ────────────────────────────────────── */
    .history-card { background: var(--nori-light); border-radius: var(--r-xl); padding: 16px; border: 1px solid var(--kewpie-faint); margin-bottom: 10px; }
    .history-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--wasabi-dim); color: var(--wasabi); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-stamps { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin: 8px 0; }
    .history-stamps svg { width: 100%; height: auto; display: block; }
    /* Wave 14.2 — signup preview card stamps need the same SVG-fills-cell rule
       as the live history grid; otherwise the SVG renders at intrinsic size
       (~21px) and collapses the parent cell despite our aspect-ratio + maxWidth. */
    .signup-preview-stamp svg { width: 100%; height: 100%; display: block; }
    .history-meta { display: flex; gap: 14px; margin-top: 8px; }
    .history-meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--kewpie-muted); }

    /* ── Empty / Profile / Privacy ──────────────────── */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; gap: 10px; }
    .empty-icon { font-size: 40px; opacity: 0.5; margin-bottom: 4px; }
    .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--kewpie-faint); }
    .profile-row:last-child { border-bottom: none; }
    .privacy-content h2 { font-family: var(--fd); font-size: 17px; font-weight: 700; color: var(--kewpie); margin: 20px 0 6px; }
    .privacy-content h2:first-child { margin-top: 0; }
    .privacy-content p { font-size: 13px; line-height: 1.7; color: var(--kewpie-dim); margin-bottom: 10px; }
    .privacy-content ul { padding-left: 20px; margin-bottom: 10px; }
    .privacy-content li { font-size: 13px; line-height: 1.7; color: var(--kewpie-dim); margin-bottom: 3px; }
    .back-button { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--wasabi); font-family: var(--fb); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 16px; }
    .back-button svg { width: 18px; height: 18px; }

    /* ── Toast / Spinner / Auth ─────────────────────── */
    .toast { position: fixed; top: calc(var(--safe-top) + 12px); left: 50%; transform: translateX(-50%); background: var(--nori-deep); border: 1.5px solid var(--kewpie-faint); border-radius: var(--r-md); padding: 10px 18px; font-size: 13px; font-weight: 600; z-index: 100; animation: slideUp 0.3s var(--ease); max-width: 88%; text-align: center; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }
    /* Branded post-verify banner — Nori surface + wasabi accent + roo. Slides
       down from the top on auto-login after the email-verify link, then auto-
       dismisses (~4s, handled in JS). On-brand replacement for a plain toast. */
    .verified-banner { position: fixed; top: calc(var(--safe-top) + 12px); left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; background: var(--nori-deep); border: 1.5px solid rgba(212,251,111,0.45); border-left: 4px solid var(--wasabi); border-radius: var(--r-md); padding: 12px 18px 12px 14px; z-index: 120; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 0 22px rgba(212,251,111,0.18); animation: verifiedBannerIn 0.42s var(--ease) both; }

    .verified-banner-sub { font-family: var(--fb); font-size: 12px; font-weight: 600; color: var(--kewpie-dim); margin-top: 2px; }
    @keyframes verifiedBannerIn { 0% { opacity: 0; transform: translate(-50%, -14px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
    .spinner { width: 24px; height: 24px; border: 2.5px solid var(--wasabi-dim); border-top-color: var(--wasabi); border-radius: 50%; animation: spin 0.6s linear infinite; }
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; }
    .home-wordmark { height: 30px; display: block; }
    .loading-wordmark { height: 40px; display: block; margin-bottom: 4px; }
    /* PWA shell sets html/body/#root to overflow:hidden + height:100%, so scroll
       has to live inside this container. Auto margins on first/last child centre
       short content (verify-email, forgot-password) while still scrolling top-
       anchored when content overflows (signup form). Safe-area padding mirrors
       the post-login .screen rule so iPhone notch + home indicator are clear. */
    .auth-screen { display: flex; flex-direction: column; height: 100%; padding: calc(var(--safe-top) + 40px) 20px calc(var(--safe-bottom) + 60px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .auth-screen::-webkit-scrollbar { width: 0; height: 0; }
    .auth-screen > *:first-child { margin-top: auto; }
    .auth-screen > *:last-child { margin-bottom: auto; }
    /* Wave 14.2 — progressive form reveal. Rest of the form is conditionally
       rendered (not in DOM at all until expanded), so when it mounts this
       keyframe runs once: fade in + slide up from translateY(20px). No
       fill-mode so if the animation is paused (e.g. inactive browser tab),
       the element shows its natural visible state instead of getting stuck

    @keyframes formRestSlideUp {

      100% { opacity: 1; transform: translateY(0); }

    .auth-logo { text-align: center; margin-bottom: 6px; }
    .auth-logo img { width: 180px; height: auto; }
    .auth-subtitle { text-align: center; font-family: var(--fd); font-size: 15px; color: var(--kewpie-dim); margin-bottom: 28px; }
    /* Wave 14.2 — signup hero treatment: bigger, bolder Gelica title with sub-copy nested right under it. */
    .auth-hero {
      text-align: center;
      font-family: var(--fd);
      font-size: 38px;
      font-weight: 800;

      animation: authHeroPulse 2.8s ease-in-out infinite;

  <script>
/* PREVIEW SHIM — never committed. Boots the REAL app into a faux logged-in Home
   with no backend. Classic script runs before the deferred module, so the stub
   is installed before the app boots. */
(function () {
  // 1) Neutralise the service worker (no caching between edits)
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register = function () { return Promise.reject('preview: SW disabled'); };
      navigator.serviceWorker.getRegistrations && navigator.serviceWorker.getRegistrations()
        .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); }).catch(function () {});
    }
  } catch (e) {}

  // 2) Mock token so checkAuth() skips refresh and loads the app
  var CID = 'faux-cust-1';
  try {
    localStorage.setItem('rolled_token', 'MOCK.PREVIEW.TOKEN');
    // pre-seed one-time reveal memos as already-seen so no overlay covers Home
    localStorage.setItem('unlocked_seen:' + CID, '[]');
    localStorage.setItem('claim_reveal_seen:' + CID, '1');
    localStorage.setItem('rolled_ref_mates_seen', '0');
  } catch (e) {}

  // 3) Fixtures — a brand-new kiosk customer: 2 stamps, no special cards
  var profile = {
    id: CID, first_name: 'Join the club', last_name: '', email: 'jordan@example.com',
    loyalty_id: 'ROLL-J7K2M9', loyalty_tier: 'Standard', tier: 'Standard',
    completed_cards: 0, cards_completed: 0, stamp_count: 2,
    marketing_opt_in: true, sms_opt_in: false, phone: '0400 000 000',
    date_of_birth: '1996-05-04', gender: 'prefer-not-to-say',
    created_at: '2026-07-20T10:00:00Z', mates_in: 0, mates_target: 20
  };
  var card = {
    card_id: 'faux-card-1', id: 'faux-card-1', stamp_count: 2, status: 'active',
    card_type: 'standard', started_at: '2026-07-20T10:00:00Z'
  };
  var stamps = [
    { id: 's1', created_at: '2026-07-20T10:00:00Z', method: 'signup_bonus', is_bonus: true },
    { id: 's2', created_at: '2026-07-20T10:01:00Z', method: 'signup_bonus', is_bonus: true }
  ];

  var MOCK = {
    '/api/v1/customers/me': { customer: profile },
    '/api/v1/customers/me/card': { card: card, stamps: stamps },
    '/api/v1/customers/me/special-cards': { cards: [] },
    '/api/v1/customers/me/history': { completed_cards: [] },
    '/api/v1/customers/me/reward-history': { redemptions: [], items: [] },
    '/api/v1/customers/me/referral': { enabled: false, mates_in: 0 },
    '/api/v1/marketing-copy': { copy: {} }
  };
  window.__MOCK_PREVIEW__ = MOCK;

  function json(obj, status) {
    return new Response(JSON.stringify(obj), { status: status || 200, headers: { 'Content-Type': 'application/json' } });
  }

  // 4) Fetch override — canned JSON per exact path; force /me/tiers to fail so the
  //    app builds tiers from the already-loaded profile (its resilient fallback).
  var realFetch = window.fetch ? window.fetch.bind(window) : null;
  window.fetch = function (url, opts) {
    try {
      var u = (typeof url === 'string') ? url : (url && url.url) || '';
      var path = u.replace(/^https?:\/\/[^/]+/, '').replace(/[?&]_t=\d+/g, '').split('?')[0];
      if (path.indexOf('/customers/me/tiers') > -1) return Promise.resolve(json({}, 500));
      if (path.indexOf('/auth/refresh') > -1) return Promise.resolve(json({ token: 'MOCK' }, 200));
      if (Object.prototype.hasOwnProperty.call(MOCK, path)) return Promise.resolve(json(MOCK[path], 200));
      if (path.indexOf('/api/') > -1) return Promise.resolve(json({}, 200)); // benign default
    } catch (e) {}
    return realFetch ? realFetch(url, opts) : Promise.resolve(json({}, 200));
  };
})();

  <script type="module">
    // Framework libs are SELF-HOSTED under /vendor/ (same-origin static files),
    // NOT fetched from a runtime CDN. A cold load over mobile / an in-app browser
    // (WhatsApp etc.) used to blank to a Nori screen if any esm.sh fetch lost the
    // race — the whole module script would fail and nothing rendered until a
    // manual refresh (real tester hit this on a claim link; flagged in the 2 Jul
    // audit — no SRI on the CDN dep). These are pinned, self-contained esm.sh
    // bundles; react-dom's internal react import is rewritten to ./react@18.2.0.js
    // so there's a single shared React instance. Precached by sw.js STATIC_ASSETS.
    import { createRoot } from './vendor/react-dom@18.2.0.client.js';
    import React, { useState, useEffect, useLayoutEffect, useRef, useCallback } from './vendor/react@18.2.0.js';
    import htm from './vendor/htm@3.1.1.js';
    import QRCode from './vendor/qrcode@1.5.3.js';

    const html = htm.bind(React.createElement);
    // api.eatrolled.com is same-site with club.eatrolled.com, so the httpOnly
    // refresh cookie flows and silent-refresh works again (fix: "logged out on
    // every open"). Deploy LAST — only after api.eatrolled.com resolves AND the
    // API has COOKIE_DOMAIN=.eatrolled.com + COOKIE_SAMESITE=lax set. Until then
    // this must stay the Railway host, or the app can't reach the API.
    const API_BASE = 'https://api.eatrolled.com';

    // Tag <html> with is-ios so the special-card ambient finish runs livelier on
    // iPhone (no gyro there): faster birthday holo + more frequent free-sushi
    // sheen (JJ, 2026-06-24). Same UA test the stamp-channel detection uses.
    // Android/desktop keep the calmer default timing (Android also has live tilt).
    try {
      const _ua = navigator.userAgent || '';
      if (/iPad|iPhone|iPod/.test(_ua) || (/Mac/.test(_ua) && (navigator.maxTouchPoints || 0) > 1)) {
        document.documentElement.classList.add('is-ios');
      }
    } catch (_e) {}
    const POLL_INTERVAL = 12000;   // home auto-refresh cadence (was 8s — eased to cut API load / rate-limit pressure; pull-to-refresh covers instant)
    // Last-known special cards, cached at module scope so they survive a
    // HomeScreen remount (e.g. Profile → Home). Without this, the fresh mount
    // resets to [] and — if the refetch is rate-limited / offline — the cards
    // vanish entirely (the bug JJ hit). Cleared on sign-out.
    let _specialCardsCache = [];
    // The Collection shows a different (longer) list than the Home deck — every archived
    // card, not one per type — so it needs its own cache. Sharing the Home one made the
    // shelf paint the short list first and then shift as the archived cards popped in.
    let _collectionCardsCache = [];
    // A customer holds at most one active card of each special type, but bad data
    // (e.g. a double-issued Birthday card) can return two — and admin-revoked
    // cards used to linger in the deck with a broken "Revoked" face where the
    // QR belongs. Rules (2 Jul): revoked cards leave the deck entirely (the
    // server keeps the soft-revoked row for the audit trail); then one card per
    // type, preferring a usable card (available > pending_activation > the
    // rest) and the newest issue on ties — so a stale duplicate can never hide
    // the live card or break the armed-QR poll's find-by-id.
    // NB: duplicates are also guarded server-side (backend #69/#70); this is
    // the belt-and-braces customer-facing layer.
    const dedupeSpecialCards = (cards) => {
      if (!Array.isArray(cards)) return [];
      const live = cards.filter(c => c && c.card_type && c.status !== 'revoked');
      const rank = (c) => c.status === 'available' ? 3 : c.status === 'pending_activation' ? 2 : 1;
      const issued = (c) => { const t = new Date(c.issued_at || 0).getTime(); return Number.isFinite(t) ? t : 0; };
      const best = new Map();
      for (const c of live) {
        const cur = best.get(c.card_type);
        if (!cur || rank(c) > rank(cur) || (rank(c) === rank(cur) && issued(c) > issued(cur))) best.set(c.card_type, c);
      }
      return live.filter(c => best.get(c.card_type) === c);
    };

    // The Collection shelf is a keepsake, not a wallet, so it must NOT collapse to one
    // card per type the way the Home deck does. Launch Day is deliberately repeatable
    // (each launch event mints its own card), so a regular will genuinely hold several
    // past ones — dedupeSpecialCards would show only the newest and silently eat the
    // rest. Keep the one-live-card-per-type rule, then add back every archived card.
    const collectionSpecialCards = (cards) => {
      if (!Array.isArray(cards)) return [];
      const liveOnly = dedupeSpecialCards(cards.filter(c => !isArchivedCard(c)));
      const archived = cards
        .filter(c => c && c.card_type && c.status !== 'revoked' && isArchivedCard(c))
        .sort((a, b) => new Date(b.issued_at || 0) - new Date(a.issued_at || 0));
      return [...liveOnly, ...archived];
    };
    // What the HOME deck is allowed to show. The deck is the wallet: every card
    // in it is one the customer can walk up to the till and use, so a card whose
    // window has closed has no business there. The scanner rejects any status
    // that isn't 'available', so offering Redeem on an expired card is a promise
    // the till can't keep.
    // The bug this fixes (18 Jul): a customer holding a past Launch Day card saw
    // it in the deck under its own "Available until 2 May 2026" kicker — a date
    // in the past — and could tap through toward Redeem. Because dedupeSpecialCards
    // keeps one card per TYPE, the expired one could also WIN that pick and be the
    // only launch card shown; and the first-run unlock reveal would cheerfully
    // celebrate it.
    // Filtered HERE rather than inside dedupeSpecialCards on purpose: the
    // Collection shelf shares that helper and deliberately keeps finished cards
    // as a keepsake, so narrowing the shared helper would quietly empty the shelf.
    // NB: the backend recomputes 'expired' from expires_at on every read
    // (specialCards.js cardStatus), so this is a date check by proxy — there is no
    // window where a still-usable card reads as expired here.
    const homeDeckCards = (cards) => dedupeSpecialCards(cards).filter(c => c.status !== 'expired');

    // ════════════════════════════════════════════════════════════════
    // TIER CONFIG (Bronze killed, Diamond added — locked 2 Apr 2026)
    // Standard → Silver(3) → Gold(7) → Platinum(15) → Diamond(25)
    // ════════════════════════════════════════════════════════════════
    const TIERS = [
      { name: 'Silver', req: 3 },
      { name: 'Gold', req: 7 },
      { name: 'Platinum', req: 15 },
      { name: 'Diamond', req: 25 }
    ];
    // Tier a completed card was PLAYED under (not the tier it earned). Card #7 earns Gold
    // but was played as Silver — hence `cardNum > t.req`, not `>=`. Module-scope on
    // purpose: Completed Cards and Reward History both render a tier for the SAME card,
    // and they have to agree. Note this deliberately differs from the backend's
    // reward-history tier, which counts the card towards its own tier.
    const getTierAtCard = (cardNum) => { let tier = null; for (const t of TIERS) { if (cardNum > t.req) tier = t.name; } return tier; };
    const TIER_COLORS = { Silver: '#A8A9AD', Gold: '#D4A017', Platinum: '#B0C4DE', Diamond: '#B9F2FF' };
    const TIER_CLASSES = { Silver: 'roo-silver', Gold: 'roo-gold', Platinum: 'roo-platinum', Diamond: 'roo-diamond' };
    const TIER_EXCLUDED = ['New', 'None', 'Bronze', 'new', 'none', 'bronze', ''];

    // Rewards tab — the locked tier ladder (mirrors backend loyalty_tiers + the
    // GET /me/tiers contract). Used as a resilient fallback if that endpoint is
    // unavailable (e.g. backend not yet deployed) so the tab always renders.
    const REWARD_LADDER = [
      { name: 'standard', threshold: 0,  reward_description: '2 Free Rolls' },
      { name: 'silver',   threshold: 3,  reward_description: '2 Free Rolls + Any Dip' },
      { name: 'gold',     threshold: 7,  reward_description: '2 Free Rolls + Aussie Snack' },
      { name: 'platinum', threshold: 15, reward_description: '3 Free Rolls + Any Dip' },
      { name: 'diamond',  threshold: 25, reward_description: '4 Free Rolls or 3 Free Rolls + Drink' },
    ];
    // Dark ink for the lock glyph sitting on each metallic tier-block texture.
    const TIER_TEXT_INK = { standard: 'var(--kewpie)', silver: '#2f3438', gold: '#4a3506', platinum: '#2f3a45', diamond: '#1f4a5e' };

    // ── Cards whose window has closed (a past Launch Day, say) ──────────────
    // They stay on the shelf rather than vanishing — people keep them — but they
    // must read as finished at a glance. The backend already sorts them last
    // (specialCards.js listCustomerCards: available -> pending -> the rest).
    // ONE word, in one place, so it's a one-line change to reword.
    const isArchivedCard = (c) => !!c && c.status === 'expired';
    // A Day 1 card can wear the colours of the centre it opened — Trafford's rose
    // marble, gold and verdigris. Keyed off the centre the card was issued at, so a
    // launch with no centre (or one we haven't styled) keeps the original sky-blue
    // and nothing changes. Add a centre here + a matching CSS block to theme it.
    const DAY1_THEMES = { 'trafford centre': 'trafford' };
    const launchTheme = (c) => {
      const name = (c && (c.centre_name || c.launch_event_name) || '').trim().toLowerCase();
      return DAY1_THEMES[name] || '';
    };
    // dd/mm/yy of the run, for the Collection tile. UTC to match the card faces —
    // a window ending 23:59Z must not slide back a day for anyone west of it.
    function runDateShort(c) {
      const raw = c && (c.available_until || c.expires_at);
      if (!raw) return '';
      const d = new Date(raw);
      if (isNaN(d)) return '';
      const p = (n) => String(n).padStart(2, '0');
      return p(d.getUTCDate()) + '/' + p(d.getUTCMonth() + 1) + '/' + String(d.getUTCFullYear()).slice(2);
    }

    // ════════════════════════════════════════════════════════════════
    // MARKETING COPY FALLBACKS (Wave 10 — opt-in surfaces)
    // Backend serves these via GET /api/v1/marketing-copy. If the fetch
    // fails or a key is missing, these defaults keep the UI sensible.
    // Strings match the backend seed verbatim — single source of truth.
    // ════════════════════════════════════════════════════════════════
    const MARKETING_COPY_FALLBACK = {
      marketing_signup_checkbox_label: 'Yeah, send me the good stuff — exclusive offers, new card drops, free sushi alerts.',
      marketing_profile_helper: "We email maybe twice a month. Promise it'll be worth opening.",
      marketing_post_reward_title: 'Two free rolls down, mate \u{1F363}',

    };

    function parseTier(rawTier) {
      if (!rawTier) return null;
      const t = rawTier.charAt(0).toUpperCase() + rawTier.slice(1).toLowerCase();
      return TIER_EXCLUDED.includes(rawTier) || TIER_EXCLUDED.includes(t) ? null : t;
    }

    // ════════════════════════════════════════════════════════════════
    // TOKEN MANAGEMENT
    // ════════════════════════════════════════════════════════════════
    // Access token lives in three places, read in priority order: cookie →
    // localStorage → in-memory. On an iOS standalone PWA the in-memory copy is
    // dropped on suspend and script-set cookies aren't reliably persisted across
    // launches, which logged returning customers out — localStorage IS persisted
    // across PWA launches, so it's the durable layer. (No worse for XSS than the
    // existing JS-readable cookie; the secure long-lived credential is the
    // separate HTTP-only refresh cookie used by tryRefresh.)
    const TOKEN_KEY = 'rolled_token';
    let _memToken = null;

    function getToken() {
      try {
        const c = document.cookie.split('; ').find(r => r.startsWith('token='))?.split('=')[1];
        if (c) return c;
      } catch {}
      try {
        const ls = localStorage.getItem(TOKEN_KEY);
        if (ls) return ls;
      } catch {}
      return _memToken;
    }

    function setToken(token, days = 7) {
      _memToken = token;
      try { localStorage.setItem(TOKEN_KEY, token); } catch {}
      const d = new Date();
      d.setTime(d.getTime() + days * 86400000);
      document.cookie = `token=${token};expires=${d.toUTCString()};path=/;SameSite=Lax;Secure`;
    }

    function clearToken() {
      _memToken = null;
      try { localStorage.removeItem(TOKEN_KEY); } catch {}
      document.cookie = 'token=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
      // Session ended — also drop the cached special/collection cards so a forced
      // logout (a 401 on a shared FOH/family device) can't flash the previous
      // customer's cards to the next person before their own data loads.
      _specialCardsCache = []; _collectionCardsCache = [];
    }

    // ════════════════════════════════════════════════════════════════
    // CROSS-SESSION SIGN-UP SOURCE ATTRIBUTION
    // ════════════════════════════════════════════════════════════════
    // A printed sushi-box / counter QR carries ?source=<tag>. That tag is
    // read into React state at mount and posted on signup — but a customer
    // who scans, closes the tab, and signs up in a LATER session would post
    // no source, so the printed run's conversion (the pilot's headline KPI)
    // undercounts delayed converters. So on capture we also stash the source
    // in localStorage with a timestamp; if a later signup has no URL source,
    // we fall back to the stored one inside a 7-day window (else ignore it).
    // Only the plain ?source= tag is persisted — NOT the recruiter ?claim=
    // token (15-min TTL, single-use) and NOT the special-card claim token.
    const SIGNUP_SOURCE_KEY = 'rolled.signup_source.v1';
    const SIGNUP_SOURCE_MAX_AGE = 7 * 86400000; // 7 days in ms

    function storeSignupSource(source) {
      if (!source) return;
      try { localStorage.setItem(SIGNUP_SOURCE_KEY, JSON.stringify({ source, ts: Date.now() })); } catch {}
    }

    // Returns the stored source if present and inside the 7-day window;
    // otherwise clears the stale/malformed entry and returns null.
    function readStoredSignupSource() {
      let raw = null;
      try { raw = localStorage.getItem(SIGNUP_SOURCE_KEY); } catch {}
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.source && typeof parsed.ts === 'number' && (Date.now() - parsed.ts) < SIGNUP_SOURCE_MAX_AGE) {
          return parsed.source;
        }
      } catch {} // fall through — a malformed entry is cleared below
      try { localStorage.removeItem(SIGNUP_SOURCE_KEY); } catch {} // stale / malformed
      return null;
    }

    function clearStoredSignupSource() {
      try { localStorage.removeItem(SIGNUP_SOURCE_KEY); } catch {}
    }

    // ════════════════════════════════════════════════════════════════
    // API WITH SILENT TOKEN REFRESH
    // ════════════════════════════════════════════════════════════════
    let _isRefreshing = false;
    let _refreshPromise = null;

    async function tryRefresh() {
      if (_isRefreshing) return _refreshPromise;
      _isRefreshing = true;
      _refreshPromise = (async () => {
        try {
          const res = await fetch(`${API_BASE}/api/v1/auth/refresh`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
          });
          if (!res.ok) throw new Error('Refresh failed');
          const data = await res.json();
          const t = data.access_token || data.token;
          if (t) { setToken(t); return true; }
          return false;
        } catch { return false; }
        finally { _isRefreshing = false; _refreshPromise = null; }
      })();
      return _refreshPromise;
    }

    async function api(path, options = {}, retried = false) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      // credentials:'include' is REQUIRED on every call — not just for sending the
      // refresh cookie, but so the browser HONOURS Set-Cookie on the cross-origin
      // responses that mint it (login / signup / verify-email). Per the Fetch spec
      // a cross-origin response's Set-Cookie is discarded unless the REQUEST used
      // credentials:'include', so without this the httpOnly refresh cookie set by
      // /auth/login was never stored → the 15-min access token expired → the next
      // /auth/refresh had no cookie → customers were logged out on reopen. CORS is
      // already credentialed (Access-Control-Allow-Credentials: true, exact origin).
      const res = await fetch(`${API_BASE}${path}${path.includes('?') ? '&' : '?'}_t=${Date.now()}`, { ...options, headers, cache: 'no-store', credentials: 'include' });
      if (res.status === 401 && !retried) {
        const ok = await tryRefresh();
        if (ok) return api(path, options, true);
      }
      // Parse defensively: rate-limit (429) and proxy errors come back as PLAIN
      // TEXT (e.g. "Too many requests"), so a blind res.json() throws
      // "Unexpected token 'T'" and takes the whole app down. Read text, try
      // JSON, fall back to the raw string as the error message.
      const raw = await res.text();
      let data = {};
      if (raw) { try { data = JSON.parse(raw); } catch { data = { error: raw }; } }
      if (!res.ok) {
        const err = new Error(data.error || data.message || (res.status === 429 ? 'Too many requests — give it a sec.' : 'Request failed'));
        err.status = res.status;   // lets callers tell a real 401 from a transient 429/5xx
        if (data && data.reason) err.reason = data.reason;   // machine-readable reason (claim links: paused/expired/fully_claimed/not_found)
        throw err;
      }
      return data;
    }

    // ════════════════════════════════════════════════════════════════
    // HOOKS
    // ════════════════════════════════════════════════════════════════
    function useToast() {
      const [toast, setToast] = useState(null);
      const show = useCallback((msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      }, []);
      const ToastEl = toast ? html`<div class="toast ${toast.type}">${toast.msg}</div>` : null;
      return { show, ToastEl };
    }

    function usePullToRefresh(onRefresh, containerRef, disabledRef) {
      const [pulling, setPulling] = useState(false);
      const [refreshing, setRefreshing] = useState(false);
      const startY = useRef(0);
      const isPulling = useRef(false);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const onTS = (e) => { if (disabledRef && disabledRef.current) return; if (el.scrollTop <= 0) { startY.current = e.touches[0].clientY; isPulling.current = true; } };
        const onTM = (e) => { if (!isPulling.current) return; if (e.touches[0].clientY - startY.current > 60 && el.scrollTop <= 0) setPulling(true); };
        const onTE = async () => {
          if (pulling && !refreshing) {
            setRefreshing(true);
            try { await onRefresh(); } catch {}
            setRefreshing(false);
          }
          isPulling.current = false;
          setPulling(false);
        };
        el.addEventListener('touchstart', onTS, { passive: true });
        el.addEventListener('touchmove', onTM, { passive: true });
        el.addEventListener('touchend', onTE);
        return () => { el.removeEventListener('touchstart', onTS); el.removeEventListener('touchmove', onTM); el.removeEventListener('touchend', onTE); };
      }, [pulling, refreshing, onRefresh]);

      return { pulling: pulling || refreshing };
    }

    function SoyFishMini({ filled }) {
      const bodyFill = filled ? '#d4fb6f' : 'rgba(254,250,240,0.08)';

    // ════════════════════════════════════════════════════════════════
    // QR CODE
    // ════════════════════════════════════════════════════════════════
    // Wave 2 channel tracking — QR payload is `<loyalty_id>|<channel>` so
    // the FOH scanner can tag every stamp with where it came from. Channel
    // is detected from userAgent at QR-generation time.
    //   iOS Safari/Chrome (incl. iPadOS-on-Mac sniffing) → app-ios
    //   Android (Chrome / Samsung / etc.)                → app-android
    //   Everything else (desktop dev, edge cases)         → unknown
    // The visible pill below the QR stays as the bare loyalty_id so
    // customers still see something memorable.
    function detectAppChannel() {
      if (typeof navigator === 'undefined') return 'unknown';
      const ua = navigator.userAgent || '';
      const isIOS = /iPad|iPhone|iPod/.test(ua) || (/Mac/.test(ua) && (navigator.maxTouchPoints || 0) > 1);
      if (isIOS) return 'app-ios';
      if (/Android/i.test(ua)) return 'app-android';
      return 'unknown';
    }

    function FauxCelebration() {
      const fish = [0,1,2,3,4].map((i) => { const a = (i / 5) * Math.PI * 2 + 0.6; const d = 60 + ((i * 23) % 30); return { dx: Math.cos(a) * d, dy: Math.sin(a) * d, rot: -28 + ((i * 37) % 56), size: 20 + ((i * 13) % 8), delay: (0.08 + (i % 4) * 0.06) }; });
      const sparks = [0,1,2,3].map((i) => { const a = (i / 4) * Math.PI * 2 + 0.3; const d = 48 + ((i * 29) % 26); return { dx: Math.cos(a) * d, dy: Math.sin(a) * d, size: 11 + ((i * 7) % 6), color: i % 2 === 0 ? '#fefaf0' : '#ffffff', delay: (0.05 + (i % 3) * 0.08) }; });

            ${sparks.map((p, i) => html`<div key=${'fcs' + i} class="faux-cel-spark" style=${{ width: p.size + 'px', height: p.size + 'px', '--dx': p.dx + 'px', '--dy': p.dy + 'px', animationDelay: p.delay + 's' }}><svg viewBox="0 0 24 24" width=${p.size} height=${p.size}><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill=${p.color}/></svg></div>`)}

    function RedemptionQR({ loyaltyId, cardId }) {

    // Mate Referral — QR of the member's referral link (club.eatrolled.com/?ref=<code>).

    function ReferralQR({ link }) {

    // auto-redeems (JJ, 17 Jul). Old scanners ignore the |reward suffix and still claim via

    function ClubRewardQR({ loyaltyId }) {
      const canvasRef = useRef(null);

      founders:       '#d8b45a',
      centre:         '#8496a6',

    const specialAccent = (cardType) => SPECIAL_ACCENTS[cardType] || '#d4fb6f';
    // A themed Day 1 card (e.g. Trafford) has to carry its own colour through the
    // claim flow too, or you tap a marble card and get a sky-blue QR. Keyed off the
    // CARD, not just its type; an unthemed card falls straight through to the map.
    const DAY1_THEME_ACCENT = { trafford: '#8fd8bf' };
    const DAY1_THEME_FINISH = { trafford: 'linear-gradient(135deg,#52262a,#733a38 38%,#b58f38 72%,#e8c068)' };
    // Themed Day 1 cards are DARK (marble), unlike the light sky-blue default, so the
    // claim payoff text has to flip to cream — nori on marble is unreadable. Same trap

    const cardAccent = (card) => {

    const cardIsDark = (card) => {

    function SpecialCardFace({ card, profile, context }) {

    // Day-of-month with ordinal suffix: 2 -> "2nd", 21 -> "21st".
    function ordinalDay(d) {
      const j = d % 10, k = d % 100;

      if (j === 1) return d + 'st';
      if (j === 2) return d + 'nd';
      if (j === 3) return d + 'rd';
      return d + 'th';

    function LaunchFace({ card, profile, context }) {
      const firstName = profile?.first_name || '';
      const until = card.available_until || card.expires_at || null;
      // The window end is stored end-of-day UTC; render the DATE in UTC so it reads
      // as the admin's intended last day everywhere (a local render would roll a
      // 23:59Z end into the next day). Same reason the Birthday face pins UTC.
      const untilStr = until ? new Date(until).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'UTC' }) : '';
      // The card reads differently depending on where you're looking at it (JJ, 18 Jul).
      // In the Home deck it's a thing you can USE, so it leads with the offer and when
      // it runs out. In the Collection it's a thing you KEPT, so it leads with which
      // launch it was and that it's a limited edition. Same card, two jobs.
      const collectible = context === 'collection';
      // Which launch this was. Comes from the kiosk that issued it (site) — falls back
      // to the date alone until that's wired, so the tile is never blank.
      const launchName = card.centre_name || card.launch_event_name || '';
      const shortDate = runDateShort(card);

      // (74px pill, 11px clear) where "LIMITED" sits at 42px, the same width as the
      // "10% off" it replaces, so the pill stops resizing between the two views.
      const pill = collectible ? 'Limited' : discountPill(card, '10% off');
      const kick = collectible
        ? [launchName, shortDate].filter(Boolean).join(' ')
        : untilStr ? 'Available until ' + untilStr
        : 'Day 1 only';
      // Each launch can wear its own centre's colours. Unthemed launches keep the
      // original sky-blue, so this is inert until a card actually knows where it
      // came from.
      const theme = launchTheme(card);
      return html`
