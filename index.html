    // ════════════════════════════════════════════════════════════════
    // MAIN APP
    // ════════════════════════════════════════════════════════════════
    function App() {
      const [authState, setAuthState] = useState('loading');
      const [signupKeepFlow, setSignupKeepFlow] = useState(false);
      useEffect(() => {
        if (typeof location !== 'undefined' && location.hash === '#keepform') { setTimeout(() => { setSignupKeepFlow(true); setAuthState('signup'); }, 500); }
      }, []);
      const [tab, setTab] = useState('home');
      const [profile, setProfile] = useState(null);
      const [card, setCard] = useState(null);
      const [stamps, setStamps] = useState([]);
      const [showPrivacy, setShowPrivacy] = useState(false);
      const [resetToken, setResetToken] = useState(null);
      const [signupSource, setSignupSource] = useState(null);
      // Mate Referral — the ?ref=<code> a mate arrived on. Captured at boot,
      // forwarded to SignupScreen (settles the card on 3) + sent as referralCode
      // in the signup POST. No replaceState, same as signupSource/claimToken.
      const [referralCode, setReferralCode] = useState(null);
      // The referrer's first name for a ?ref= link, so the signup screen can greet
      // the invited mate personally ("Sam invited you"). Resolved from the code at
      // boot via the public endpoint; null for an unknown code → generic fallback.
      const [referrerName, setReferrerName] = useState(null);
      // Recruiter claim token from the staff sign-up QR (?claim=...). Held in
      // state and forwarded on the signup POST as ?claim_token= — see the
      // SignupScreen submit. Kept in the URL (no replaceState) so a mid-form
      // refresh doesn't lose the attribution.
      const [claimToken, setClaimToken] = useState(null);
      // Special-card claim link (/claim?token=..., backend PR #83). DISTINCT
      // from claimToken above — that one attributes a signup to a recruiting
      // staff member; this one redeems a minted card_claim_links row. Held in
      // state (survives the in-SPA signup/login round-trip) AND mirrored to
      // sessionStorage (survives a mid-flow page refresh; the token stays in
      // the URL too, same no-replaceState reasoning as the recruiter token).
      const [cardClaimToken, setCardClaimToken] = useState(null);
      const [cardClaimInfo, setCardClaimInfo] = useState(null); // link preview card — lets the signup verify screen name the claimed card
      const [claimStage, setClaimStage] = useState(null);       // null | 'gate' (claim screen showing) | 'auth' (user picked signup/login from the gate)
      const [claimAutoRun, setClaimAutoRun] = useState(false);  // post-login: claim without a second confirm
      // Transient (not persisted): set true when the user auto-logs-in via the
      // email-verify link. Signals HomeScreen to eagerly play the first-run
      // "you've got both cards" reveal + swipe coach (which are ALSO gated by a
      // permanent per-user localStorage flag so they never repeat).
      const [justVerified, setJustVerified] = useState(false);
      // Branded post-verify moment: a Nori banner with the roo + "You're in the
      // Club, mate!" that briefly overlays Home after an auto-login on the
      // email-verify link (replaces a plain toast). Auto-dismisses after ~4s.
      const [verifiedBanner, setVerifiedBanner] = useState(false);
      const verifiedBannerTimer = useRef(null);
      const showVerifiedBanner = useCallback(() => {
        setVerifiedBanner(true);
        if (verifiedBannerTimer.current) clearTimeout(verifiedBannerTimer.current);
        verifiedBannerTimer.current = setTimeout(() => setVerifiedBanner(false), 4000);
      }, []);
      // The card_type of the card the customer JUST claimed (written to
      // sessionStorage by the claim-path signup; survives the email-verify page
      // reload). Non-null ONLY on the claim/verify journey — it tells HomeScreen
      // to centre the JUST-CLAIMED special card on the first-run reveal. When
      // null (e.g. an existing customer's ordinary first Home load), the reveal
      // centres the regular Club Card instead. HomeScreen clears it once used.
      const [claimedCardType, setClaimedCardType] = useState(() => {
        try { return sessionStorage.getItem('claimed_card_type') || null; } catch { return null; }
      });
      const clearClaimedCardType = useCallback(() => {
        setClaimedCardType(null);
        try { sessionStorage.removeItem('claimed_card_type'); } catch {}
      }, []);
      const [marketingCopy, setMarketingCopy] = useState(MARKETING_COPY_FALLBACK);
      // Mate Referral — simple "bonus stamp added" popup shown when a mate the
      // member invited comes in-store (their mates_in count went up since last
      // open). Delta tracked per-device in localStorage; polled once per mount.
      const [refBonusPopup, setRefBonusPopup] = useState(false);
      const refPolledRef = useRef(false);
      const { show: showToast, ToastEl } = useToast();
      const openPrivacy = useCallback(() => setShowPrivacy(true), []);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const verify = params.get('verify'); const reset = params.get('reset'); const urlSource = params.get('source');
        const claim = params.get('claim');
        const refCode = params.get('ref');  // Mate Referral link (?ref=<code>)
        // URL ?source= is the primary path; persist it so a customer who scans
        // a printed QR now but signs up in a LATER session still attributes.
        // If the URL has no source, fall back to the stored one (7-day window,
        // else it's ignored + cleared inside readStoredSignupSource).
        if (urlSource) storeSignupSource(urlSource);
        const source = urlSource || readStoredSignupSource();
        if (source) setSignupSource(source);
        if (claim) setClaimToken(claim);
        if (refCode) {
          setReferralCode(refCode);
          // Resolve the code → referrer first name for the personal signup header.
          api('/api/v1/customers/referral/resolve?code=' + encodeURIComponent(refCode))
            .then(r => { if (r && r.name) setReferrerName(r.name); })
            .catch(() => {});
        }
        // /claim?token=... — special-card claim link. The _redirects rewrite
        // serves the SPA for /claim; the claim gate renders INSTEAD of the
        // normal route until the visitor claims, joins, or opts out.
        // sessionStorage covers a refresh that loses the query string.
        if (window.location.pathname === '/claim') {
          let cardTok = params.get('token') || null;
          try {
            if (cardTok) sessionStorage.setItem('card_claim_token', cardTok);
            else cardTok = sessionStorage.getItem('card_claim_token');
          } catch {}
          if (cardTok) { setCardClaimToken(cardTok); setClaimStage('gate'); }
        }
        // Opened from the installed home-screen icon → flag installed for good, so
        // the install nudge never fires again (covers iOS, which has no install API).
        if (pwaIsStandalone()) { try { localStorage.setItem('pwa_installed', '1'); } catch {} }
        // Wave 10 — fetch marketing copy in parallel with auth; merge over fallbacks.
        // Public endpoint, no auth required. Failures leave fallbacks in place.
        api('/api/v1/marketing-copy').then(res => { if (res && res.copy) setMarketingCopy({ ...MARKETING_COPY_FALLBACK, ...res.copy }); }).catch(() => {});
        if (verify) { api(`/api/v1/auth/verify-email/${verify}`).then(async (res) => {
          window.history.replaceState({}, '', '/');
          // Backend now returns a session on verify (access_token + refresh
          // cookie + customer). When present, log the user straight in — same
          // token handling as the login flow — and land them on Home with the
          // first-run reveal armed. When null, fall back to the old behaviour
          // (verified → bounce to login).
          const session = res && res.session;
          if (session && (session.access_token || session.token)) {
            setToken(session.access_token || session.token);
            try {
              await loadUserData();
              setJustVerified(true);        // transient: Home plays the claim reveal
              setAuthState('verified'); setTab('home');
            } catch (e) {
              // Session token didn't take (rare) — don't strand them; the
              // login screen still works and their account is verified.
              clearToken(); showToast('Email verified! You can now sign in.', 'success'); setAuthState('login');
            }
          } else {
            showToast('Email verified! You can now sign in.', 'success'); setAuthState('login');
          }
        }).catch(err => { showToast(err.message || 'Verification failed', 'error'); window.history.replaceState({}, '', '/'); setAuthState('login'); }); }
        else if (reset) { setResetToken(reset); setAuthState('reset'); window.history.replaceState({}, '', '/'); }
        // claim (staff recruiter QR) must land on SIGNUP, not login — the
        // token attributes the new account to the recruiting staff member.
        // Previously a claim-only URL fell through to the login screen and
        // the token died unused.
        else { checkAuth((source || claim || refCode) ? 'signup' : 'login'); }
      }, []);

      // Mate Referral — when the referrer next opens the app, check whether a
      // mate they invited has come in-store since last time (mates_in went up).
      // If so, show the simple "bonus stamp added" popup. Runs once per mount,
      // only once auth is verified. Proper celebration animation is a later pass.
      useEffect(() => {
        if (authState !== 'verified' || refPolledRef.current) return;
        refPolledRef.current = true;
        api('/api/v1/customers/me/referral').then(r => {
          if (!r || !r.enabled) return;
          const now = Number(r.mates_in) || 0;
          // The per-stamp "your mate came in → You Beauty!" replay on the Home
          // screen now handles this moment (see HomeScreen bonus-stamp replay), so
          // the old App-level popup is retired to avoid a double popup. Keep the
          // seen counter updated in case it's ever re-enabled.
          try { localStorage.setItem('rolled_ref_mates_seen', String(now)); } catch {}
        }).catch(() => {});
      }, [authState]);

      const checkAuth = async (noAuthFallback = 'login') => { const token = getToken(); if (!token) { /* iOS PWAs drop the in-memory token on suspend + don't reliably persist script cookies across launches, so a returning customer can arrive with no access token while their HTTP-only refresh cookie is still valid. Try a silent refresh before bouncing them to login. */ const refreshed = await tryRefresh(); if (!refreshed) { setAuthState(noAuthFallback); return; } } try { await loadUserData(); setAuthState('verified'); } catch (err) { /* Only a genuine auth failure (401, after refresh already retried) signs the user out. A rate-limit (429), network blip or 5xx must NOT clear the session — keep the token + show the app; the next poll/refresh recovers the data. */ if (err && err.status === 401) { clearToken(); setAuthState(noAuthFallback); } else { setAuthState('verified'); } } };

      const loadUserData = useCallback(async () => {
        let profileData = null;
        let cardData = null;
        let stampsData = [];
        try { const profileRes = await api('/api/v1/customers/me'); profileData = profileRes.customer || profileRes; } catch (err) { throw err; }
        try { const cardRes = await api('/api/v1/customers/me/card'); cardData = cardRes.card || cardRes; stampsData = cardRes.stamps || []; }
        catch { cardData = { stamp_count: profileData?.stamp_count || 0 }; }
        setProfile(profileData);
        setCard(cardData);
        setStamps(stampsData);
      }, []);

      const handleLogin = async (customerData) => {
        try {
          await loadUserData(); setAuthState('verified'); setTab('home');
          // Pending claim link + the visitor came through the claim gate's
          // login path \u2192 bounce back to the gate and claim straight away
          // (autoClaim skips the second confirm \u2014 they already saw the card).
          if (cardClaimToken && claimStage === 'auth') { setClaimAutoRun(true); setClaimStage('gate'); }
          const sc = card?.stamp_count ?? customerData?.stamp_count ?? 0;
          const cc = customerData?.completed_cards || customerData?.cards_completed || 0;
          // 2 bonus stamps normally, 3 for a referred mate (referral welcome bonus).
          if ((sc === 2 || sc === 3) && cc === 0) { setTimeout(() => showToast(`Welcome to the Club! You scored ${sc} bonus stamps \u{1F41F}`, 'success'), 600); }
        } catch { clearToken(); setAuthState('login'); showToast('Sign in failed \u2014 please try again', 'error'); }
      };

      // \u2500\u2500 Claim-gate exits \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
      // dest 'collection' lands on the Collection tab (freshly-claimed card);
      // anything else falls through to the normal route for the auth state.
      const finishClaimFlow = (dest) => {
        setClaimStage(null); setCardClaimToken(null); setCardClaimInfo(null); setClaimAutoRun(false);
        try { sessionStorage.removeItem('card_claim_token'); } catch {}
        try { window.history.replaceState({}, '', '/'); } catch {}
        if (dest === 'collection') setTab('collection');
      };
      // Existing-member TAP claim succeeded (ClaimLinkScreen doClaim). Mirror the
      // signup path: stash the claimed card_type in sessionStorage AND update App
      // state so that when the member next lands on Home (switching tabs in the
      // SAME session, no remount), HomeScreen's fresh-claim reveal fires and
      // swipe-coaches to the just-claimed card. Without this, a tap-claim by an
      // existing customer got NO reveal (the generic first-run flag was already
      // burned on an earlier ordinary Home load) — exactly the bug Jess hit.
      const handleTapClaim = useCallback((cardType) => {
        if (!cardType) return;
        try { sessionStorage.setItem('claimed_card_type', cardType); } catch {}
        setClaimedCardType(cardType);
      }, []);
      const handleClaimJoin = (info) => { setCardClaimInfo(info || null); setClaimStage('auth'); setAuthState('signup'); };
      const handleClaimLogin = () => { setClaimStage('auth'); setAuthState('login'); };
      // The signup consumed the token server-side \u2014 drop the stored copy so a
      // refresh can't resurrect a burnt token. (App state clears on the next
      // full page load; the verify-email link is a fresh load of "/".)
      const handleCardClaimConsumed = useCallback(() => {
        try { sessionStorage.removeItem('card_claim_token'); } catch {}
      }, []);

      const handleSignOut = () => {
        // Revoke the session server-side FIRST (fire-and-forget — signing out
        // locally must never block on the network). Without this, the
        // HTTP-only refresh cookie survives and silently re-authenticates
        // the previous user on a shared device once the API is same-site
        // post-migration. credentials:'include' sends the cookie; the
        // endpoint clears it and revokes the token.
        fetch(`${API_BASE}/api/v1/auth/logout`, { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' } }).catch(() => {});
        clearToken(); _specialCardsCache = []; _collectionCardsCache = []; setProfile(null); setCard(null); setStamps([]); setAuthState('login'); setTab('home'); setShowPrivacy(false);
      };

      if (authState === 'loading') return html`<div class="app-shell"><div class="loading-screen"><img src="rolled-logo.svg" alt="Rolled" class="loading-wordmark" /><div class="spinner"></div></div></div>`;
      if (showPrivacy) return html`<div class="app-shell"><${PrivacyPolicyScreen} onBack=${() => setShowPrivacy(false)} /></div>`;
      // Claim gate replaces the normal route (signed-in OR signed-out) until
      // the visitor claims, joins, logs in, or opts out.
      if (claimStage === 'gate' && cardClaimToken) return html`<div class="app-shell"><${ClaimLinkScreen} token=${cardClaimToken} isSignedIn=${authState === 'verified'} autoClaim=${claimAutoRun} profile=${profile} onJoin=${handleClaimJoin} onLoginInstead=${handleClaimLogin} onDone=${finishClaimFlow} onClaimed=${handleTapClaim} />${ToastEl}</div>`;
      if (authState === 'login') return html`<div class="app-shell"><${LoginScreen} onLogin=${handleLogin} onSwitch=${() => setAuthState('signup')} onForgot=${() => setAuthState('forgot')} showToast=${showToast} />${ToastEl}</div>`;
      if (authState === 'signup') return html`<div class="app-shell"><${SignupScreen} onSignup=${handleLogin} onSwitch=${() => setAuthState('login')} showToast=${showToast} signupSource=${signupSource} claimToken=${claimToken} cardClaimToken=${cardClaimToken} cardClaimInfo=${cardClaimInfo} onCardClaimConsumed=${handleCardClaimConsumed} onShowPrivacy=${openPrivacy} marketingCopy=${marketingCopy} referralCode=${referralCode} referrerName=${referrerName} keepFlow=${signupKeepFlow} />${ToastEl}</div>`;
      if (authState === 'forgot') return html`<div class="app-shell"><${ForgotPasswordScreen} onBack=${() => setAuthState('login')} />${ToastEl}</div>`;
      if (authState === 'reset') return html`<div class="app-shell"><${ResetPasswordScreen} token=${resetToken} onDone=${() => setAuthState('login')} />${ToastEl}</div>`;

      return html`
        <div class="app-shell">
          ${tab === 'home' ? html`<${HomeScreen} profile=${profile} card=${card} stamps=${stamps} onRefresh=${loadUserData} showToast=${showToast} marketingCopy=${marketingCopy} onNavigate=${setTab} firstRunHint=${justVerified} claimedCardType=${claimedCardType} onFirstRunConsumed=${() => { setJustVerified(false); clearClaimedCardType(); }} onSignUp=${() => { setSignupKeepFlow(true); setAuthState('signup'); }} />` : tab === 'collection' ? html`<${CollectionScreen} profile=${profile} showToast=${showToast} />` : tab === 'rewards' ? html`<${RewardsScreen} profile=${profile} showToast=${showToast} />` : html`<${ProfileScreen} profile=${profile} card=${card} onSignOut=${handleSignOut} onShowPrivacy=${openPrivacy} showToast=${showToast} marketingCopy=${marketingCopy} />`}
          <nav class="bottom-nav"><button class="nav-tab ${tab === 'home' ? 'active' : ''}" onClick=${() => setTab('home')}><span class="nav-ico"><${IconHome} /></span><span>Home</span></button><button class="nav-tab ${tab === 'rewards' ? 'active' : ''}" onClick=${() => setTab('rewards')}><span class="nav-ico"><${IconRewards} /></span><span>Rewards</span></button><button class="nav-tab ${tab === 'collection' ? 'active' : ''}" onClick=${() => setTab('collection')}><span class="nav-ico"><${IconCollection} /></span><span>Collection</span></button><button class="nav-tab ${tab === 'profile' ? 'active' : ''}" onClick=${() => setTab('profile')}><span class="nav-ico"><${IconProfile} /></span><span>Profile</span></button></nav>
          ${/* Post-verify "You're in the Club, mate!" banner removed per JJ — auto-login lands straight on Home, no overlay. */null}
          ${refBonusPopup ? html`
            <div class="ref-pop-scrim" onClick=${() => setRefBonusPopup(false)}>
              <div class="ref-pop" role="status" onClick=${e => e.stopPropagation()}>
                <div class="ref-pop-fish"><${SoyFishMini} filled=${true} /></div>
                <div class="ref-pop-title">Bonus stamp added!</div>
                <div class="ref-pop-body">One of your mates came in, you both get a bonus stamp!</div>
                <button class="ref-pop-btn" onClick=${() => setRefBonusPopup(false)}>Sweet</button>
              </div>
            </div>
          ` : null}
          ${ToastEl}
        </div>`;
    }

    // MOUNT + SERVICE WORKER
    // ════════════════════════════════════════════════════════════════
    createRoot(document.getElementById('root')).render(html`<${App} />`);
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register(`/sw.js?v=${Date.now()}`).then(() => console.log('[SW] Registered')).catch(err => console.warn('[SW] Failed:', err)); }
  </script>
</body>
</html>
